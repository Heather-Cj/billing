          <div style="font-size:34px;font-weight:800;color:#000;line-height:1.05">${money(b.amount)}</div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap"><span class="entity-chip" style="font-weight:700"><span class="pin"></span>${b.account}</span><span style="font-size:16px;font-weight:800;color:#000">${b.vendor}</span></div>
          <div style="font-size:12.5px;color:var(--ink-2);margin-top:6px">Invoice <b>${invOf(b)}</b>${b.due?' · due '+fmtD(b.due):''}${b.gl?' · '+b.gl:''}</div>
          ${b.link?`<a href="${b.link}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--blue);font-weight:600;margin-top:8px">View bill ${svg(ICN.arrow,13)}</a>`:''}
          ${(()=>{const vd=vendor(b.vendor);if(!vd)return '';const acctNo=vd.accounts&&vd.accounts[String(b.account)];const url=vd.payUrl;if(!url&&!acctNo)return '';return `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:10px;align-items:center">${url?`<a href="${url}" target="_blank" rel="noopener" class="btn btn-gold btn-sm" style="text-decoration:none">${svg(ICN.card,14)} Open payment portal ${svg(ICN.arrow,13)}</a>`:''}${acctNo?`<span style="font-size:12px;color:var(--ink-2)">Acct <b class="mono">${String(acctNo).replace(/</g,'&lt;')}</b></span>`:''}</div>`;})()}
        </div>
        <div class="field"><label>Pay method ${faisal?'<span style="color:var(--amber)">· this account is check-only</span>':''}</label><select id="r_method" class="selent" style="width:100%" onchange="App.recordMethodToggle()">${METHODS.map(m=>`<option ${m===dm?'selected':''}>${m}</option>`).join('')}</select></div>
        <div id="r_cc_wrap" class="field" style="display:${dm==='Credit Card'?'':'none'};margin-top:2px"><label>Credit card type</label>
          <div style="display:flex;gap:10px">
            <label style="flex:1;display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;background:#efe9fb;border:1px solid #ddd0f5;border-radius:9px;padding:10px 12px"><input type="radio" name="cctype" id="cc_chase" checked style="width:15px;height:15px"> <span><b style="color:#7c3aed">Chase</b> — roll into Chase check</span></label>

          </div>

        <div class="field"><label id="r_datelbl">${showChk?'Print date':'Payment date'}</label>${dateField('r_date',todayISO)}</div>
        <p style="font-size:11.5px;color:var(--ink-3);margin-top:8px;display:flex;gap:6px;align-items:flex-start">${svg(ICN.bolt,13)}<span>ACH / credit card → <b>Paid</b> right away. A <b>check is not paid</b> — printing it moves it to <b>To cut</b>, then it's <b>sent</b> (mailed → tracking → delivered) or <b>picked up</b>. It stays pending until that happens.</span></p>

  },
  recordMethodToggle(){const m=$('#r_method').value||'';const chk=isCheckMethod(m);const showChk=chk||m==='To be Picked Up';
    const cw=$('#r_cc_wrap');if(cw)cw.style.display=(m==='Credit Card')?'':'none';
    const kw=$('#r_chk_wrap');if(kw)kw.style.display=showChk?'':'none';
    const sub=$('#r_chk_sub');if(sub)sub.textContent=m==='To be Picked Up'?'· check being picked up':'· printing the check now';
    const dl=$('#r_datelbl');if(dl)dl.textContent=showChk?'Print date':'Payment date';
    const cf=$('#r_confirm');if(cf)cf.innerHTML=(showChk?svg(ICN.check,15)+' Print check':svg(ICN.check,15)+' Mark as Paid');
  },
  // Apply payment to ONE bill (no persist/render). Returns a short result tag.
  // Mirrors single-pay behavior exactly: ACH/online → Paid now; check/pickup → printed → To cut.
  _applyPayment(b, method, date, check, ccChase){
    if(!b) return null;
    if(FAISAL.includes(b.account)&&method==='ACH') return {skip:'check-only'};
    b.method=method;
    if(isCheckMethod(method)){
      const batch=Math.floor(printedCount()/CHECK_BATCH)+1;
      b.payType='check';b.checkStage='cut';b.checkNumber=check||'';b.printed={date,by:CURRENT.u,initials:CURRENT.initials,batch};b.stage='ready';b.paid=null;
      this.logBill(b,'Printed check',b.vendor+' · '+money(b.amount)+(check?' · #'+check:'')+' · batch '+batch);
      return {printed:true};
    }
    if(method==='To be Picked Up'){
      const batch=Math.floor(printedCount()/CHECK_BATCH)+1;
      b.payType='pickup';b.checkStage='cut';b.checkNumber=check||'';b.printed={date,by:CURRENT.u,initials:CURRENT.initials,batch};b.stage='ready';b.paid=null;b.pickedUp=null;
      this.logBill(b,'Printed pickup check',b.vendor+' · '+money(b.amount)+(check?' · #'+check:'')+' · batch '+batch);
      return {printed:true};
    }
    b.payType='online';b.paid={date,by:CURRENT.u,initials:CURRENT.initials};b.stage='paid';
    if(method==='Credit Card'){
      if(ccChase){this.rollIntoChase(b);b.paidViaChase=true;b.ccType='Chase';
        this.logBill(b,'Paid via Chase',b.vendor+' · '+money(b.amount)+' → Chase '+b.account);return {paid:true,chase:true};}
      b.ccType='Amex';
    }
    this.logBill(b,'Paid',b.vendor+' · '+money(b.amount)+' · '+method);
    return {paid:true};
  },
  recordPaid(id){const b=BILLS.find(x=>x.id===id);if(!b)return;
    const method=$('#r_method').value;const date=readDate('#r_date')||todayISO;
    if(FAISAL.includes(b.account)&&method==='ACH'){this.toast('Account '+b.account+' is check-only — pick a check method');return;}
    const check=$('#r_check')?($('#r_check').value||'').trim():'';
    const ccChase=$('#cc_chase')&&$('#cc_chase').checked;
    const r=this._applyPayment(b,method,date,check,ccChase);
    this.persist();this.closeDrawer();
    this.toast('#'+b.id+(r&&r.printed?' printed — now to cut':' marked Paid'));this.render();
  },
  // ---- Batch pay: multiple ready bills for one vendor, one method + one date ----
  openBatchPay(vname){if(!can('record'))return;
    const bills=BILLS.filter(b=>b.stage==='ready'&&!b.payType&&!b.isChase&&b.vendor===vname);
    if(!bills.length){this.toast('No ready bills for '+vname);return;}

      <div class="dr-head"><div class="vlogo" style="width:42px;height:42px;border-radius:11px">${abbr(vname)}</div><div><div style="font-weight:700;font-size:15px">Pay multiple — ${vname}</div><div style="font-size:12.5px;color:var(--ink-3)">${bills.length} ready bill${bills.length!==1?'s':''} · one method & date</div></div><button class="x" data-close>${svg(ICN.x,16)}</button></div>
      <div class="dr-body">
        <div style="background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:14px">

          <div id="bp_count" style="font-size:12.5px;color:var(--ink-2);margin-top:4px">${bills.length} bills selected</div>
        </div>
        <div class="field"><label>Pay method ${anyFaisal?'<span style="color:var(--amber)">· some accounts are check-only</span>':''}</label><select id="bp_method" class="selent" style="width:100%" onchange="App.batchToggle()">${METHODS.map(m=>`<option ${m===dm?'selected':''}>${m}</option>`).join('')}</select></div>
        <div class="field"><label id="bp_datelbl">${isCheckMethod(dm)||dm==='To be Picked Up'?'Print date':'Payment date'}</label>${dateField('bp_date',todayISO)}</div>
        <div id="bp_chknote" style="display:${isCheckMethod(dm)||dm==='To be Picked Up'?'':'none'};font-size:11.5px;color:var(--ink-3);margin:-4px 0 8px">Each check gets its own number when you cut it — leave check #s for the cutting step.</div>
        <div style="border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-top:6px">
          <div style="display:flex;justify-content:space-between;padding:8px 12px;background:var(--surface-2);font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3)"><span>Include</span><button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 8px" onclick="App.batchAll(true)">All</button></div>
          ${bills.map(b=>`<label style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-top:1px solid var(--line);cursor:pointer;font-size:13px"><input type="checkbox" class="bp_pick" data-id="${b.id}" data-amt="${+b.amount||0}" checked onchange="App.batchRecount()" style="width:16px;height:16px"><span class="entity-chip" style="font-size:11px"><span class="pin"></span>${b.account}</span><span style="flex:1;color:var(--ink-2)">${invOf(b)}${b.due?' · due '+fmtD(b.due):''}</span><b class="mono">${money(b.amount)}</b></label>`).join('')}
        </div>
      </div>
      <div class="dr-foot"><button class="btn btn-ghost" data-close>Cancel</button><button id="bp_confirm" class="btn btn-gold" style="margin-left:auto" onclick="App.batchConfirm()">${svg(ICN.check,15)} ${isCheckMethod(dm)||dm==='To be Picked Up'?'Print '+bills.length+' checks':'Pay '+bills.length+' bills'}</button></div>`);
  },
  batchPicked(){return Array.from(document.querySelectorAll('.bp_pick:checked'));},
  batchRecount(){const picks=this.batchPicked();const total=picks.reduce((s,el)=>s+(+el.dataset.amt||0),0);
    const t=$('#bp_total');if(t)t.textContent=money(total);
    const c=$('#bp_count');if(c)c.textContent=picks.length+' bills selected';
    this.batchToggle(picks.length);
  },
  batchAll(on){document.querySelectorAll('.bp_pick').forEach(el=>el.checked=on);this.batchRecount();},
  batchToggle(n){const m=$('#bp_method')?$('#bp_method').value:'';const isChk=isCheckMethod(m)||m==='To be Picked Up';
    const dl=$('#bp_datelbl');if(dl)dl.textContent=isChk?'Print date':'Payment date';
    const note=$('#bp_chknote');if(note)note.style.display=isChk?'':'none';
    const count=(typeof n==='number')?n:this.batchPicked().length;
    const cf=$('#bp_confirm');if(cf)cf.innerHTML=svg(ICN.check,15)+' '+(isChk?'Print '+count+' checks':'Pay '+count+' bills');
  },
  batchConfirm(){
    const method=$('#bp_method').value;const date=readDate('#bp_date')||todayISO;
    const picks=this.batchPicked();
    if(!picks.length){this.toast('Select at least one bill');return;}
    const ids=picks.map(el=>+el.dataset.id);
    let done=0,skipped=0;
    ids.forEach(id=>{const b=BILLS.find(x=>x.id===id);if(!b)return;
      const r=this._applyPayment(b,method,date,'',false);
      if(r&&r.skip)skipped++;else if(r)done++;
    });
    this.log('Batch payment',this._batchVendor+' · '+done+' bills · '+method);
    this.persist();this.closeDrawer();
    this.toast(done+' bill'+(done!==1?'s':'')+' processed'+(skipped?' · '+skipped+' skipped (check-only)':''));
    this.render();
  },

  rollIntoChase(b){let ch=openChase(b.account);
    if(!ch){ch={id:nextId++,isChase:true,vendor:'Chase-Card-Services',account:b.account,inv:'CHASE-'+b.account,gl:'Credit Card',due:'',receivedDate:todayISO,method:'Check',tracking:'',stage:'ready',chaseStage:'print',connected:[],amount:0,checkNumber:'',enteredBy:CURRENT.u,enteredInitials:CURRENT.initials,approval:null,paid:null,printed:null,cut:null,deposited:null,pickedUp:null,sync:'synced'};BILLS.unshift(ch);}
    if(!ch.connected.includes(b.id))ch.connected.push(b.id);
    ch.amount=ch.connected.reduce((s,cid)=>{const ob=BILLS.find(x=>x.id===cid);return s+(ob?(+ob.amount||0):0);},0);
    b.chaseRef=ch.id;
  },

  /* ---------- pickup ---------- */
  markPickup(id){const b=BILLS.find(x=>x.id===id);if(!b||!can('pickup'))return;

    this.logBill(b,'Picked up',b.vendor+' · '+money(b.amount)+(b.checkNumber?' · #'+b.checkNumber:''));
    this.persist();this.toast('Picked up #'+b.id);this.render();
  },

  /* ---------- bill detail ---------- */
  openBill(id){id=+id;const b=BILLS.find(x=>x.id===id);if(!b)return;
    if(b.isChase)return this.openChaseBill(b);

    if(b.stage==='pending'&&this.canApproveBill(b))acts.push(`<button class="btn btn-gold" onclick="App.closeDrawer();App.openApprove(${b.id})">Review</button>`);
    if(b.stage==='ready'&&!b.payType&&can('record'))acts.push(`<button class="btn btn-gold" onclick="App.closeDrawer();App.openRecord(${b.id})">${svg(ICN.dollar,14)} Pay Bill</button>`);
    if(b.payType==='check'){
      if(can('record')){
        if(b.checkStage==='print')acts.push(`<button class="btn btn-gold" onclick="App.closeDrawer();App.openPrint(${b.id})">${svg(ICN.check,14)} Print check</button>`);
        else if(b.checkStage==='cut')acts.push(`<button class="btn btn-gold" onclick="App.markCut(${b.id});App.closeDrawer()">${svg(ICN.check,14)} Mark Cut</button>`);
        else if(b.checkStage==='send')acts.push(`<button class="btn btn-gold" onclick="App.markSent(${b.id});App.closeDrawer()">${svg(ICN.truck,14)} Send</button>`);
      }
      if((can('record')||can('create'))&&b.checkStage==='transit'){
        acts.push(`<button class="btn btn-ghost" onclick="App.closeDrawer();App.openTracking(${b.id})">${svg(ICN.truck,14)} ${(b.sent&&b.sent.tracking)?'Edit tracking #':'Tracking #'}</button>`);
        acts.push(`<button class="btn btn-gold" onclick="App.closeDrawer();App.openDeliver(${b.id})">${svg(ICN.check,14)} Mark delivered</button>`);
      }
    }
    if(b.payType==='pickup'){
      if(can('record')){
        if(b.checkStage==='print')acts.push(`<button class="btn btn-gold" onclick="App.closeDrawer();App.openPrint(${b.id})">${svg(ICN.check,14)} Print check</button>`);
        else if(b.checkStage==='cut')acts.push(`<button class="btn btn-gold" onclick="App.markCut(${b.id});App.closeDrawer()">${svg(ICN.check,14)} Mark Cut</button>`);
      }
      if(b.checkStage==='pickup'&&can('pickup'))acts.push(`<button class="btn btn-gold" onclick="App.markPickup(${b.id});App.closeDrawer()">${svg(ICN.truck,14)} Picked up</button>`);
    }
    const editDel=(canEdit('bills')?`<button class="btn btn-ghost" onclick="App.closeDrawer();App.openEditBill(${b.id})">${svg(ICN.edit,14)} Edit</button>`:'')+(canDelete()?`<button class="btn btn-ghost" style="color:var(--red)" onclick="App.deleteBill(${b.id})">${svg(ICN.trash,14)} Delete</button>`:'');
    const sb=(b.stage==='ready'&&b.due)?sendByISO(b.due):'';
    const hist=(b.history||[]).slice().reverse();
    const histHtml=hist.length?`<div class="card-h" style="border-top:1px solid var(--line-2);margin-top:8px;padding:12px 0 4px"><h3 style="font-size:13px">History</h3><span class="sub">${hist.length} event${hist.length!==1?'s':''}</span></div>
      <div style="display:flex;flex-direction:column">${hist.map(h=>`<div style="display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--line-2)"><div class="avatar" style="width:24px;height:24px;font-size:9px;flex-shrink:0">${h.initials||'—'}</div><div style="flex:1;min-width:0"><div style="font-size:12.5px;font-weight:600;color:var(--ink-1)">${h.act}${h.detail?` <span style="font-weight:400;color:var(--ink-3)">— ${h.detail}</span>`:''}</div><div style="font-size:11px;color:var(--ink-3)">${h.who} · ${fmtDT(h.at)}</div></div></div>`).join('')}</div>`:'';
    this.openDrawerEl(`
      <div class="dr-head"><div class="vlogo" style="width:42px;height:42px;border-radius:11px">${abbr(b.vendor)}</div><div><div style="font-weight:700;font-size:15px">${b.vendor}</div><div style="font-size:12.5px;color:var(--ink-3)">Bill #${b.id}${b.inv?(" · "+b.inv):""}</div></div><button class="x" data-close>${svg(ICN.x,16)}</button></div>
      <div class="dr-body">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">${statusBadge(b)}${b.prepaid?'<span class="badge b-violet"><span class="dot"></span>Prepaid</span>':''}${b.paidViaChase?'<span class="badge b-violet"><span class="dot"></span>Via Chase</span>':''}${b.pickedUp?'<span class="badge b-green"><span class="dot"></span>Picked up</span>':''}${urgencyChip(b)}</div>
        <div style="font-size:34px;font-weight:800;color:#000;line-height:1.05">${money(b.amount)}</div>
        <div style="display:flex;align-items:center;gap:10px;margin:6px 0 4px;flex-wrap:wrap"><span class="entity-chip" style="font-weight:700"><span class="pin"></span>${b.account}</span><b style="font-size:15px;color:#000">${b.vendor}</b></div>
        ${b.link?`<a href="${b.link}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--blue);font-weight:600;margin-bottom:8px">View bill ${svg(ICN.arrow,13)}</a>`:''}
        <dl class="kv">
          <dt>Bill ID</dt><dd class="mono" style="font-weight:700">#${b.id}</dd>
          <dt>Invoice #</dt><dd class="mono">${invOf(b)}</dd>
          <dt>GL account</dt><dd>${b.gl||'—'}</dd>
          <dt>Received</dt><dd class="mono">${fmtD(b.receivedDate)}</dd>
          <dt>Due date</dt><dd class="mono">${b.due?fmtD(b.due):'—'}</dd>
          ${sb?`<dt>Send by</dt><dd class="mono">${fmtD(sb)} <span style="color:var(--ink-3)">(due − ${LEAD}d)</span></dd>`:''}
          <dt>Method</dt><dd>${b.method||'<span style="color:var(--ink-3)">not set yet (AP)</span>'}${b.paidViaChase?` · <span style="color:#7c3aed">rolled into Chase ${b.account}</span>`:''}</dd>
          ${b.checkNumber?`<dt>Check #</dt><dd class="mono">${b.checkNumber}${b.printed&&b.printed.batch?' · batch #'+b.printed.batch:''}</dd>`:''}
          ${b.printed?`<dt>Printed</dt><dd class="mono">${fmtD(b.printed.date)} · ${b.printed.initials}</dd>`:''}
          ${b.cut?`<dt>Cut</dt><dd class="mono">${fmtD(b.cut.date)} · ${b.cut.initials}</dd>`:''}
          ${b.sent?`<dt>Sent</dt><dd class="mono">${fmtD(b.sent.date)} · ${b.sent.initials}${b.sent.tracking?' · USPS '+b.sent.tracking:''}</dd>`:''}
          ${b.delivered?`<dt>Delivered</dt><dd class="mono">${fmtD(b.delivered.date)} · ${b.delivered.initials}</dd>`:''}
          ${b.stage==='pending'?`<dt>Awaiting approval</dt><dd>${b.approval&&b.approval.approver?((USERS.find(u=>u.u===b.approval.approver)||{}).name||b.approval.approver):'Any approver'}</dd>`:''}
          ${b.approval&&b.approval.status&&b.approval.status!=='pending'?`<dt>${b.approval.status==='approved'?'Approved':'Rejected'}</dt><dd>${b.approval.byInitials||''} · ${fmtD(b.approval.date)}${b.approval.note?' · '+b.approval.note:''}</dd>`:''}
          ${b.paid?`<dt>Payment date</dt><dd class="mono">${fmtD(b.paid.date)}</dd><dt>Paid by</dt><dd>${b.paid.initials}</dd>`:''}
          ${b.chaseRef?`<dt>Chase check</dt><dd><span onclick="App.openBill(${b.chaseRef})" style="cursor:pointer;color:var(--blue);font-weight:600">Chase ${b.account} · #${b.chaseRef} ${svg(ICN.arrow,12)}</span></dd>`:''}
          <dt>Entered by</dt><dd>${b.enteredInitials}</dd>
        </dl>
        ${histHtml}
      </div>
      <div class="dr-foot"><button class="btn btn-ghost" data-close>Close</button>${editDel}<div style="margin-left:auto;display:flex;gap:8px">${acts.join('')}</div></div>`);
    this.showPreview(b);
  },

  /* ---------- Chase rollup detail ---------- */
  openChaseBill(ch){

    const acts=[];

        <div>${connected.length?connected.map(ob=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:13px"><span class="mono" style="background:var(--surface-2);padding:2px 7px;border-radius:6px;font-size:11px;white-space:nowrap">${ob.vendor}${ob.inv}</span><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--blue);cursor:pointer" onclick="App.openBill(${ob.id})">${ob.vendor}</span><span class="mono" style="font-weight:600">${money(ob.amount)}</span></div>`).join(''):'<div style="color:var(--ink-3);font-size:13px;padding:8px 0">No bills attached.</div>'}</div>

  /* ---------- check pipeline ---------- */
  openPrint(id){const b=BILLS.find(x=>x.id===+id);if(!b||!can('record'))return;const chase=!!b.isChase;
    const inp='border:none;background:none;width:100%;font:inherit;font-weight:600;padding:9px 11px';
    this.openDrawerEl(`
      <div class="dr-head"><div class="vlogo" style="width:42px;height:42px;border-radius:11px">${svg(ICN.check,18)}</div><div><div style="font-weight:700;font-size:15px">Print check</div><div style="font-size:12.5px;color:var(--ink-3)">${chase?'Chase · '+b.account:b.vendor+' · '+b.inv}</div></div><button class="x" data-close>${svg(ICN.x,16)}</button></div>
      <div class="dr-body">
        <div style="background:var(--surface-2);border-radius:11px;padding:13px 16px;margin-bottom:14px"><div style="font-size:24px;font-weight:800;color:#000">${money(b.amount)}</div><div style="font-size:12.5px;color:var(--ink-2);margin-top:3px"><span class="entity-chip"><span class="pin"></span>${b.account}</span> ${chase?'Chase reimbursement · '+b.connected.length+' bills':b.vendor}</div></div>
        <div class="field"><label>Check #</label><div class="inp" style="padding:0"><input id="pr_check" placeholder="Physical check number" style="${inp}"></div></div>
        <div class="field"><label>Print date</label>${dateField('pr_date',todayISO)}</div>
        <p style="font-size:11.5px;color:var(--ink-3);margin-top:8px;display:flex;gap:6px;align-items:flex-start">${svg(ICN.bolt,13)}<span>Stamped with the date, your initials <b>${CURRENT.initials}</b>, and a batch number (${CHECK_BATCH} per batch). Then it moves to <b>To cut</b> — still pending payment.</span></p>
      </div>
      <div class="dr-foot"><button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-gold" style="margin-left:auto" onclick="App.doPrint(${b.id})">${svg(ICN.check,14)} Print check</button></div>`);
  },
  doPrint(id){const b=BILLS.find(x=>x.id===+id);if(!b)return;
    const check=$('#pr_check')?($('#pr_check').value||'').trim():'';const date=readDate('#pr_date')||todayISO;
    const batch=Math.floor(printedCount()/CHECK_BATCH)+1;
    b.checkNumber=check;b.printed={date,by:CURRENT.u,initials:CURRENT.initials,batch};
    if(b.isChase){b.chaseStage='cut';b.tracking=check;}else{b.checkStage='cut';}
    this.logBill(b,'Printed check',(b.isChase?'Chase '+b.account:b.vendor)+(check?' · #'+check:'')+' · batch '+batch);
    this.persist();this.closeDrawer();this.toast('Printed'+(check?' #'+check:'')+' · batch '+batch+' — now to cut');this.render();
  },
  markCut(id){const b=BILLS.find(x=>x.id===+id);if(!b||!can('record'))return;
    b.cut={date:todayISO,by:CURRENT.u,initials:CURRENT.initials};
    if(b.isChase){b.chaseStage='deposit';}
    else if(b.payType==='pickup'){b.checkStage='pickup';}
    else{b.checkStage='send';}
    const dest=b.isChase?'→ to deposit':b.payType==='pickup'?'→ ready for pickup':'→ to send';
    this.logBill(b,'Cut check',(b.isChase?'Chase '+b.account:b.vendor)+' '+dest);
    this.persist();this.toast('#'+b.id+' cut'+(b.isChase?' — ready to deposit':b.payType==='pickup'?' — ready for pickup':' — ready to send'));this.render();
  },
  /* send: one click, NO tracking # (it's added afterward in Tracking) */
  markSent(id){const b=BILLS.find(x=>x.id===+id);if(!b||b.isChase||!can('record'))return;
    b.sent={date:todayISO,by:CURRENT.u,initials:CURRENT.initials,tracking:(b.sent&&b.sent.tracking)||''};b.checkStage='transit';
    this.logBill(b,'Sent check',b.vendor+' · '+money(b.amount));
    this.persist();this.toast('#'+b.id+' is on the way — add the USPS tracking # in Tracking');this.render();
  },
  /* tracking # entered after sending (data entry or AP) */
  openTracking(id){const b=BILLS.find(x=>x.id===+id);if(!b||!(can('record')||can('create')))return;
    const inp='border:none;background:none;width:100%;font:inherit;font-weight:600;padding:9px 11px';

      <div class="dr-body">
        <div style="background:var(--surface-2);border-radius:11px;padding:13px 16px;margin-bottom:14px"><div style="font-size:24px;font-weight:800;color:#000">${money(b.amount)}</div><div style="font-size:12.5px;color:var(--ink-2);margin-top:3px"><span class="entity-chip"><span class="pin"></span>${b.account}</span> ${b.vendor}</div></div>
        <div class="field"><label>Tracking #</label><div class="inp" style="padding:0"><input id="tk_track" value="${(b.sent&&b.sent.tracking)||''}" placeholder="USPS tracking number" style="${inp}"></div></div>
        <p style="font-size:11.5px;color:var(--ink-3);margin-top:8px;display:flex;gap:6px;align-items:flex-start">${svg(ICN.bolt,13)}<span>Track it on usps.com, then set the delivered date when it arrives. (Live USPS auto-tracking by vendor nickname is planned.)</span></p>
      </div>
      <div class="dr-foot"><button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-gold" style="margin-left:auto" onclick="App.saveTracking(${b.id})">Save tracking #</button></div>`);
  },
  saveTracking(id){const b=BILLS.find(x=>x.id===+id);if(!b)return;const t=$('#tk_track')?($('#tk_track').value||'').trim():'';

  /* delivered date entered when USPS confirms delivery */
  openDeliver(id){const b=BILLS.find(x=>x.id===+id);if(!b||!(can('record')||can('create')))return;

      <div class="dr-body">
        <div style="background:var(--surface-2);border-radius:11px;padding:13px 16px;margin-bottom:14px"><div style="font-size:24px;font-weight:800;color:#000">${money(b.amount)}</div><div style="font-size:12.5px;color:var(--ink-2);margin-top:3px"><span class="entity-chip"><span class="pin"></span>${b.account}</span> ${b.vendor}${b.sent&&b.sent.tracking?' · USPS '+b.sent.tracking:''}</div></div>

  doDeliver(id){const b=BILLS.find(x=>x.id===+id);if(!b)return;const date=readDate('#dv_date')||todayISO;

  /* ---------- edit bill fields (tier-gated) ---------- */
  openEditBill(id){const b=BILLS.find(x=>x.id===+id);if(!b||b.isChase||!canEdit('bills'))return;
    const inp='border:none;background:none;width:100%;font:inherit;font-weight:600;padding:9px 11px';

    const accts=ACCOUNTS.map(a=>a.code);

    this.openDrawerEl(`
      <div class="dr-head"><div class="vlogo" style="width:42px;height:42px;border-radius:11px">${svg(ICN.edit,18)}</div><div><div style="font-weight:700;font-size:15px">Edit bill</div><div style="font-size:12.5px;color:var(--ink-3)">#${b.id} · ${b.vendor}</div></div><button class="x" data-close>${svg(ICN.x,16)}</button></div>

  saveEditBill(id){const b=BILLS.find(x=>x.id===+id);if(!b||!canEdit('bills'))return;

    const before={vendor:b.vendor,account:b.account,amount:b.amount,inv:b.inv,gl:b.gl,due:b.due};
    const nv=(g('#e_vendor')||b.vendor),na=(g('#e_acct')||b.account),ninv=((g('#e_inv')||'').trim()||b.inv);
    const namt=parseFloat(g('#e_amt'));
    if(FAISAL.includes(na)&&b.method&&b.method==='ACH'){this.toast('Account '+na+' is check-only — change the method first');return;}
    b.vendor=nv;b.account=na;b.inv=ninv;b.gl=(g('#e_gl')||'').trim();b.due=mdyToISO(g('#e_due')||'');b.link=(g('#e_link')||'').trim();

    if(!isNaN(namt))b.amount=namt;

    const chg=[];if(before.vendor!==b.vendor)chg.push('vendor');if(before.account!==b.account)chg.push('account');if(+before.amount!==+b.amount)chg.push('amount');if(before.inv!==b.inv)chg.push('invoice');if(before.gl!==b.gl)chg.push('GL');if(before.due!==b.due)chg.push('due');
    this.logBill(b,'Edited',b.vendor+(chg.length?' · '+chg.join(', '):' · details'));

  openDrawerEl(html){this.hidePreview();$('#drawer').innerHTML=html;$('#drawer').classList.add('on');$('#scrim').classList.add('on');$('#drawer').querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>this.closeDrawer());},

    const safe=String(b.link).replace(/"/g,'&quot;');const emb=String(embedUrl(b.link)).replace(/"/g,'&quot;');
    const p=document.createElement('div');p.id='billpreview';
    p.style.cssText='position:fixed;top:0;bottom:0;left:0;right:'+dw+'px;z-index:60;background:#0f1626;display:flex;flex-direction:column';
    p.innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:#0b1220;color:#fff;flex-shrink:0">
        <div style="width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.1);display:grid;place-items:center">${svg(ICN.bills,15)}</div>
        <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.vendor} · ${b.inv}</div><div style="font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Bill preview</div></div>
        <a href="${safe}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#d4af37;text-decoration:none;white-space:nowrap">Open ${svg(ICN.arrow,13)}</a>
      </div>
      <div style="flex:1;position:relative;background:#fff">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;color:var(--ink-3);font-size:13px;line-height:1.5">Loading preview…<br>If it stays blank, sign in to Microsoft 365 in this browser, or use <b style="margin:0 4px">Open ↗</b>.</div>
        <iframe src="${safe}" referrerpolicy="no-referrer" style="position:absolute;inset:0;width:100%;height:100%;border:0;background:transparent"></iframe>
      </div>`;
    document.body.appendChild(p);
  },
  persist(){ if(!TOKEN)return; API.saveOps().catch(e=>{ if(e.offline){API.online=false;this.toast('Offline — changes not saved');} else {this.toast('Save failed — '+(e.message||''));} }); },

  // --- Excel sync ---------------------------------------------------------
  // Map a bill to a row. KEYS HERE MUST MATCH YOUR EXCEL TABLE HEADERS EXACTLY.
  billToExcelRecord(b){
    if(!b) return null;
    const paid = (b.paid&&b.paid.date) ? b.paid.date : ((b.delivered&&b.delivered.date)||'');
    return {
      'Invoice Id'    : b.inv || '',                       // <- unique match key
      'Invoice Date'  : isoToMDY(b.invoiceDate||''),
      'Received Date' : isoToMDY(b.receivedDate||''),
      'Vendor'        : b.vendor || '',
      'Account'       : b.account || '',
      'Amount'        : (typeof b.amount==='number'? b.amount : (parseFloat(b.amount)||0)),
      'Due Date'      : isoToMDY(b.due||''),
      'Status'        : b.stage || '',
      'Paid Date'     : isoToMDY(paid),
      'Entered By'    : b.enteredInitials || b.enteredBy || '',
      'Bill #'        : b.id,
    };
  },
  // Fire-and-forget upsert; never blocks the user or breaks the save.
  syncBill(b){
    if(!TOKEN || !b || b.isChase) return;
    const rec = this.billToExcelRecord(b);
    if(!rec || !rec['Invoice Id']) return; // need a key
    API.syncInvoice(rec)
      .then(r=>{ if(r&&r.error){ console.warn('Excel sync:',r.error); }
                 else { b.xl = (r&&r.updated)?'updated':'added'; } })
      .catch(e=>{ if(!e.offline) console.warn('Excel sync failed:', e.message||e); });
  },
  search(q){this.state.q=q;if(['bills','vendors'].includes(this.state.view))this.render();else this.go('bills');},
  toast(msg){const t=document.createElement('div');t.className='toast';t.innerHTML=`${svg(ICN.check,16)}${msg}`;$('#toasts').appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2600)},
};
App.init();
</script>
</body>
