<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Captain Jay's AP Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy-900:#0A2240; --navy-800:#102E52; --navy-700:#173B64; --navy-600:#1F4A78;
  --gold:#D4AF37; --gold-deep:#B8911F; --gold-soft:rgba(212,175,55,.16);
  --canvas:#EDF1F6; --surface:#FFFFFF; --surface-2:#F6F8FB;
  --line:#E2E8F0; --line-2:#EDF1F6;
  --ink:#0F1B2D; --ink-2:#475569; --ink-3:#8493A6;
  --green:#2F7D55; --green-bg:#E5F3EB; --amber:#A96B0A; --amber-bg:#FAEFD7;
  --red:#B42318; --red-bg:#FBE8E4; --blue:#1C6CB4; --blue-bg:#E4F0FA;
  --violet:#6A4BB0; --violet-bg:#EDE7F8;
  --r:10px; --r-sm:7px; --r-lg:16px;
  --sh-sm:0 1px 2px rgba(16,30,54,.06),0 1px 3px rgba(16,30,54,.05);
  --sh:0 4px 14px rgba(16,30,54,.08);
  --sh-lg:0 18px 50px rgba(10,34,64,.22);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"IBM Plex Sans",system-ui,sans-serif;
  background:var(--canvas); color:var(--ink);
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace; font-variant-numeric:tabular-nums}
.num{font-variant-numeric:tabular-nums}
button{font-family:inherit; cursor:pointer; border:none; background:none}
:focus-visible{outline:2px solid var(--gold); outline-offset:2px; border-radius:4px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- layout ---------- */
.app{display:grid; grid-template-columns:248px 1fr; min-height:100vh}
.nav{
  background:linear-gradient(178deg,var(--navy-900),var(--navy-800));
  color:#C7D4E4; display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
  border-right:1px solid rgba(255,255,255,.04);
}
.brand{padding:22px 20px 18px; display:flex; gap:12px; align-items:center}
.brand-mark{
  width:40px;height:40px;border-radius:10px;flex:none;
  background:radial-gradient(120% 120% at 30% 20%,#19graphite,#0A2240);
  background:linear-gradient(150deg,var(--navy-600),var(--navy-900));
  border:1px solid rgba(212,175,55,.5); display:grid;place-items:center;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
}
.brand-mark svg{width:24px;height:24px}
.brand-name{font-weight:700;color:#fff;letter-spacing:.2px;font-size:15px;line-height:1.15}
.brand-sub{font-size:11px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.nav-scroll{overflow-y:auto;flex:1;padding:6px 12px 12px}
.nav-group{margin-top:14px}
.nav-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#5F7390;padding:0 12px 6px;font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:9px 12px;border-radius:8px;color:#C0CEE0;font-size:13.5px;font-weight:500;
  transition:background .12s,color .12s; position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:var(--navy-600);color:#fff}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-item svg{width:17px;height:17px;flex:none;opacity:.92}
.nav-badge{margin-left:auto;background:rgba(212,175,55,.18);color:var(--gold);font-size:11px;font-weight:600;
  padding:1px 7px;border-radius:20px;min-width:20px;text-align:center}
.nav-foot{padding:14px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:10px;align-items:center}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);color:var(--navy-900);
  display:grid;place-items:center;font-weight:700;font-size:13px;flex:none}
.nav-foot .nm{color:#fff;font-size:13px;font-weight:600;line-height:1.2}
.nav-foot .rl{color:#7E92AE;font-size:11.5px}

.main{display:flex;flex-direction:column;min-width:0}
.topbar{
  background:rgba(255,255,255,.86);backdrop-filter:saturate(140%) blur(8px);
  border-bottom:1px solid var(--line); padding:12px 26px; position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:18px;
}
.crumb h1{font-size:18px;margin:0;font-weight:700;letter-spacing:-.01em}
.crumb p{margin:1px 0 0;font-size:12.5px;color:var(--ink-3)}
.search{margin-left:auto;position:relative;width:300px;max-width:34vw}
.search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:9px;
  background:var(--surface-2);font-size:13px;color:var(--ink)}
.search input::placeholder{color:var(--ink-3)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ink-3)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:9px;font-size:13px;font-weight:600;
  transition:filter .12s,background .12s,box-shadow .12s;white-space:nowrap}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--navy-900);color:#fff;box-shadow:var(--sh-sm)}
.btn-primary:hover{filter:brightness(1.14)}
.btn-gold{background:var(--gold);color:var(--navy-900)}
.btn-gold:hover{filter:brightness(1.05)}
.btn-ghost{background:var(--surface);color:var(--ink-2);border:1px solid var(--line)}
.btn-ghost:hover{background:var(--surface-2);color:var(--ink)}
.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-danger:hover{filter:brightness(.97)}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:7px}

.view{padding:24px 26px 60px;max-width:1320px;width:100%}

/* ---------- generic blocks ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-sm)}
.card-h{padding:16px 18px 0;display:flex;align-items:center;gap:10px}
.card-h h3{margin:0;font-size:14px;font-weight:700;letter-spacing:-.01em}
.card-h .sub{font-size:12px;color:var(--ink-3);margin-left:auto}
.section-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:4px 0 12px}

.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 16px 15px;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.kpi .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;margin-bottom:12px}
.kpi .ic svg{width:17px;height:17px}
.kpi .v{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1}
.kpi .l{font-size:12.5px;color:var(--ink-2);margin-top:5px;font-weight:500}
.kpi .d{position:absolute;top:16px;right:16px;font-size:11.5px;font-weight:600}
.kpi .d.up{color:var(--green)} .kpi .d.dn{color:var(--red)}

.grid-2{display:grid;grid-template-columns:1.55fr 1fr;gap:18px}

/* tables */
.tablewrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;
  text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--surface-2)}
tbody td{padding:12px 14px;border-bottom:1px solid var(--line-2);font-size:13px;vertical-align:middle}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--surface-2)}
tbody tr.click{cursor:pointer}
.tr-amt{font-weight:600;text-align:right}
th.r,td.r{text-align:right}
.vendorcell{display:flex;align-items:center;gap:10px}
.vlogo{width:30px;height:30px;border-radius:8px;background:var(--navy-700);color:#fff;display:grid;place-items:center;
  font-size:12px;font-weight:700;flex:none}
.vmeta b{font-weight:600;display:block;line-height:1.25}
.vmeta span{font-size:11.5px;color:var(--ink-3)}

/* badges + chips */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
.badge .dot{width:6px;height:6px;border-radius:50%}
.b-gray{background:#EEF1F5;color:#5A6B80} .b-gray .dot{background:#94A3B8}
.b-amber{background:var(--amber-bg);color:var(--amber)} .b-amber .dot{background:var(--amber)}
.b-blue{background:var(--blue-bg);color:var(--blue)} .b-blue .dot{background:var(--blue)}
.b-violet{background:var(--violet-bg);color:var(--violet)} .b-violet .dot{background:var(--violet)}
.b-green{background:var(--green-bg);color:var(--green)} .b-green .dot{background:var(--green)}
.b-red{background:var(--red-bg);color:var(--red)} .b-red .dot{background:var(--red)}
.entity-chip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:7px;background:var(--surface-2);
  border:1px solid var(--line);font-size:12px;font-weight:600;color:var(--navy-700)}
.entity-chip .pin{width:5px;height:5px;border-radius:50%;background:var(--gold)}
.sync{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2)}
.sync .dot{width:7px;height:7px;border-radius:50%}
.conf{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.conf .bar{width:42px;height:5px;border-radius:4px;background:#E6EBF1;overflow:hidden}
.conf .bar i{display:block;height:100%;border-radius:4px}

.filters{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.seg{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
.seg button{padding:6px 12px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--ink-2)}
.seg button.on{background:var(--navy-900);color:#fff}
.selent{padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface);font-size:13px;font-weight:500;color:var(--ink);min-width:170px}
.vchip{padding:5px 11px;border:1px solid var(--line);border-radius:999px;background:var(--surface);font-size:12px;font-weight:500;color:var(--ink-2);cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:5px}
.vchip:hover{border-color:var(--gold);color:var(--ink)}
.vchip b{color:var(--ink);font-weight:700}
.vchip.on{background:var(--gold);border-color:var(--gold);color:#1a1205}
.vchip.on b{color:#1a1205}
.eom-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.eom-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.eom-card.warn{border-color:#e7b53c66}
.ec-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:600}
.ec-big{font-size:28px;font-weight:700;color:var(--ink);line-height:1.1;margin:4px 0 2px}
.ec-sub{font-size:12px;color:var(--ink-3)}
.eom-bar{width:84px;height:7px;border-radius:999px;background:var(--line);overflow:hidden}
.eom-bar>div{height:100%;border-radius:999px;transition:width .3s}
@media(max-width:720px){.eom-cards{grid-template-columns:1fr}}

/* attention list */
.att{display:flex;flex-direction:column}
.att-row{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--line-2)}
.att-row:last-child{border-bottom:none}
.att-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none}
.att-ic svg{width:17px;height:17px}
.att-tx b{font-weight:600} .att-tx p{margin:1px 0 0;font-size:12px;color:var(--ink-3)}
.att-row .amt{margin-left:auto;text-align:right}
.att-row .amt b{font-weight:700;display:block}
.att-row .amt span{font-size:11.5px;color:var(--ink-3)}

/* entity grid */
.ent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.ent-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--sh-sm);transition:transform .1s,box-shadow .12s;cursor:pointer}
.ent-card:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.ent-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.ent-code{font-weight:700;font-size:14px;letter-spacing:-.01em}
.ent-card .nm{font-size:11.5px;color:var(--ink-3);min-height:15px}
.ent-stat{display:flex;justify-content:space-between;align-items:flex-end;margin-top:11px}
.ent-stat .open b{font-size:18px;font-weight:700} .ent-stat .open span{font-size:11px;color:var(--ink-3);display:block}

/* drawer */
.scrim{position:fixed;inset:0;background:rgba(10,22,40,.42);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:540px;max-width:94vw;background:var(--surface);
  box-shadow:var(--sh-lg);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:61;
  display:flex;flex-direction:column}
.drawer.on{transform:translateX(0)}
.dr-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:14px}
.dr-head .x{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--ink-3);background:var(--surface-2)}
.dr-head .x:hover{color:var(--ink);background:var(--line-2)}
.dr-body{padding:20px 22px;overflow-y:auto;flex:1}
.dr-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;background:var(--surface-2)}
.kv{display:grid;grid-template-columns:130px 1fr;gap:10px 14px;margin:14px 0}
.kv dt{color:var(--ink-3);font-size:12.5px;font-weight:500}
.kv dd{margin:0;font-size:13px;font-weight:500}
.field{margin:13px 0}
.field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:600;margin-bottom:5px}
.field .inp{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--surface-2);font-size:13.5px;font-weight:600}
.field .inp.ok{border-color:rgba(47,125,85,.4);background:var(--green-bg)}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.docthumb{border:1px dashed var(--line);border-radius:12px;background:repeating-linear-gradient(135deg,#F8FAFC,#F8FAFC 12px,#F1F5F9 12px,#F1F5F9 24px);
  height:150px;display:grid;place-items:center;color:var(--ink-3);font-size:12.5px;text-align:center;margin-bottom:16px}

/* toast */
.toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--navy-900);color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:500;
  box-shadow:var(--sh-lg);display:flex;align-items:center;gap:9px;animation:rise .25s ease}
.toast svg{width:16px;height:16px;color:var(--gold)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.empty{padding:40px;text-align:center;color:var(--ink-3)}
.empty svg{width:34px;height:34px;opacity:.5;margin-bottom:8px}

.split-pay{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.pay-meth{border:1px solid var(--line);border-radius:14px;padding:15px;background:var(--surface);box-shadow:var(--sh-sm)}
.pay-meth .mh{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.pay-meth .mh .mi{width:30px;height:30px;border-radius:8px;display:grid;place-items:center}
.pay-meth .mh b{font-weight:700} .pay-meth .mh span{margin-left:auto;font-size:12px;color:var(--ink-3)}
.pay-meth .tot{font-size:22px;font-weight:700;letter-spacing:-.02em}
.pay-meth .cnt{font-size:12px;color:var(--ink-3);margin-top:2px}

.menu-toggle{display:none}
@media(max-width:920px){
  .app{grid-template-columns:1fr}
  .nav{position:fixed;left:0;top:0;width:248px;z-index:70;transform:translateX(-100%);transition:transform .24s}
  .nav.open{transform:none}
  .menu-toggle{display:grid;place-items:center;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:var(--surface)}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .search{display:none}
  .split-pay{grid-template-columns:1fr}
}
</style>

</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="nav" id="nav">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 14c2.5-1.4 4.5-1.4 6 0 1.5 1.4 3.5 1.4 6 0 1.5-1.4 3.5-1.4 6 0" stroke="#D4AF37" stroke-width="1.6" stroke-linecap="round"/><path d="M6.5 10.5 12 4l5.5 6.5" stroke="#D4AF37" stroke-width="1.6" stroke-linejoin="round" fill="none"/><circle cx="12" cy="11" r="1.4" fill="#D4AF37"/></svg>
      </div>
      <div>
        <div class="brand-name">Captain Jay's</div>
        <div class="brand-sub">AP Hub</div>
      </div>
    </div>
    <div class="nav-scroll" id="navItems"></div>
    <div class="nav-foot">
      <div class="avatar">SA</div>
      <div><div class="nm">Sara A.</div><div class="rl">Accounts Payable</div></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" onclick="document.getElementById('nav').classList.toggle('open')" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="crumb"><h1 id="vTitle">Dashboard</h1><p id="vSub">Tuesday, June 24 · all entities</p></div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
        <input placeholder="Search bills, vendors, store #, account #…" oninput="App.search(this.value)">
      </div>
      <button class="btn btn-gold" onclick="App.openCreate()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg> New bill
      </button>
    </header>
    <main class="view" id="view"></main>
  </div>
</div>

<!-- DRAWER -->
<div class="scrim" id="scrim" onclick="App.closeDrawer()"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true"></aside>
<div class="toasts" id="toasts"></div>

<script>
const $=(s,r=document)=>r.querySelector(s);
const money=n=>'$'+Math.abs(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const todayISO='2026-06-24';
const fmtD=d=>{if(!d)return '—';const t=new Date(d+'T00:00');if(isNaN(t))return '—';const mm=String(t.getMonth()+1).padStart(2,'0'),dd=String(t.getDate()).padStart(2,'0');return mm+'/'+dd+'/'+t.getFullYear();};
const fmtDT=ms=>{if(!ms)return '';const d=new Date(ms);if(isNaN(d))return '';return String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+'/'+d.getFullYear()+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});};
/* MM/DD/YYYY text date inputs (browser-locale-proof) */
function isoToMDY(iso){if(!iso)return '';const m=String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);return m?m[2]+'/'+m[3]+'/'+m[1]:'';}
/* turn a document link into an embeddable (frame-allowed) URL where we can */
function embedUrl(link){if(!link)return link;let u;try{u=new URL(link);}catch(e){return link;}const h=u.hostname.toLowerCase();
  if(h.endsWith('sharepoint.com')||h==='1drv.ms'||h.indexOf('onedrive.live.com')>=0){u.searchParams.set('action','embedview');return u.toString();}
  if(h==='drive.google.com'){const m=u.pathname.match(/\/file\/d\/([^/]+)/);if(m)return 'https://drive.google.com/file/d/'+m[1]+'/preview';const id=u.searchParams.get('id');if(id)return 'https://drive.google.com/file/d/'+id+'/preview';}

const chaseStageBadge=b=>badge(CHASE_STAGES[b.chaseStage]||['b-gray','Chase']);
const billBadge=b=>statusBadge(b);
const openChase=acct=>BILLS.find(b=>b.isChase&&b.account===acct&&b.chaseStage==='print');
const isCheckMethod=m=>m==='Check'||m==='DFD Check';
const isOnlineMethod=m=>m==='ACH'||m==='DFD ACH'||m==='Credit Card'||m==='Amex';
const printedCount=()=>BILLS.filter(b=>((b.isChase||b.payType==='check'||b.payType==='pickup')&&b.printed)).length;
/* group chase checks awaiting deposit into per-store batches of 8; returns label for one check */
function depositBatchLabel(ch){const peers=BILLS.filter(b=>b.isChase&&b.chaseStage==='deposit'&&b.account===ch.account).sort((a,b)=>((a.printed&&a.printed.date)||'').localeCompare((b.printed&&b.printed.date)||'')||a.id-b.id);const i=peers.findIndex(b=>b.id===ch.id);return ch.account+'-'+(Math.floor(Math.max(i,0)/CHECK_BATCH)+1);}
/* generic row sorter driven by App.state.sortKey / sortDir */
function sortBy(rows,key,dir){const s=dir==='desc'?-1:1;const val=(b)=>{switch(key){case 'id':return b.id;case 'amount':return +b.amount||0;case 'vendor':return (b.vendor||'').toLowerCase();case 'account':return b.account||'';case 'inv':return (b.inv||'').toLowerCase();case 'method':return (b.method||'').toLowerCase();case 'due':return b.due||'';case 'invdate':return b.invoiceDate||'';case 'date':return (b.paid&&b.paid.date)||(b.printed&&b.printed.date)||'';case 'check':return b.checkNumber||(b.isChase&&b.tracking)||'';case 'status':return (b.isChase?b.chaseStage:b.payType==='check'?b.checkStage:b.stage)||'';default:return b.id;}};return rows.slice().sort((a,b)=>{const x=val(a),y=val(b);if(x<y)return -1*s;if(x>y)return 1*s;return (a.id-b.id)*s;});}
/* ---- monthly vendor+account totals ---- */
const monthTotal=(vn,acct,mk)=>BILLS.filter(b=>!b.isChase&&b.vendor===vn&&b.account===acct&&monthKey(b.receivedDate)===mk).reduce((s,b)=>s+(+b.amount||0),0);

/* ===== backend: Netlify Functions + Blobs ===== */
const API_BASE='/.netlify/functions/api';
let TOKEN=null;
const LS={get(k){try{return localStorage.getItem(k);}catch(e){return null;}},set(k,v){try{localStorage.setItem(k,v);}catch(e){}},del(k){try{localStorage.removeItem(k);}catch(e){}}};
/* local snapshot of server-confirmed data → instant paint on open, refresh in background */
function cacheOps(){try{LS.set('aphub_ops',JSON.stringify({vendors:VENDORS,bills:BILLS,audit:AUDIT.slice(0,400),deleted:DELETED,nextId,users:USERS}));}catch(e){}}
function readCache(){try{const s=LS.get('aphub_ops');return s?JSON.parse(s):null;}catch(e){return null;}}
const SEED_ADDR={};VSEED.forEach(([n,m,a])=>{if(a)SEED_ADDR[n.toLowerCase()]=a;});
function applyOps(o){if(!o||typeof o!=='object')return;
  if(Array.isArray(o.vendors)&&o.vendors.length){VENDORS=o.vendors;VENDORS.forEach(v=>{if(!v)return;const lk=String(v.n).toLowerCase();if(!v.a&&SEED_ADDR[lk])v.a=SEED_ADDR[lk];const va=VACCT[v.n];if(va){if(!v.accounts)v.accounts=va.accounts;if(v.prevYr==null)v.prevYr=va.prevYr;}if(!v.payUrl&&VPAY[v.n])v.payUrl=VPAY[v.n];});}
  if(Array.isArray(o.bills))BILLS=o.bills;
  if(Array.isArray(o.audit)&&o.audit.length)AUDIT=o.audit;
  if(o.deleted&&typeof o.deleted==='object')DELETED={bills:Array.isArray(o.deleted.bills)?o.deleted.bills:[],vendors:Array.isArray(o.deleted.vendors)?o.deleted.vendors:[]};
  if(o.nextId)nextId=o.nextId;
  if(Array.isArray(o.users)&&o.users.length)USERS=o.users;
}
const API={
  online:true,
  async call(action,body){
    let r;
    try{r=await fetch(API_BASE+'?action='+encodeURIComponent(action),{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body||{})});}
    catch(e){const err=new Error('Offline');err.offline=true;throw err;}
    let data={};try{data=await r.json();}catch(e){}
    if(!r.ok){const err=new Error(data.error||('Request failed ('+r.status+')'));if(r.status===404)err.offline=true;else err.status=r.status;throw err;}
    return data;
  },
  async login(u,p){const d=await this.call('login',{u,p});TOKEN=d.token;LS.set('aphub_token',TOKEN);LS.set('aphub_user',JSON.stringify(d.user));this.online=true;return d.user;},
  async load(){return await this.call('load',{token:TOKEN});},
  async saveOps(){try{await this.call('saveOps',{token:TOKEN,ops:{vendors:VENDORS,bills:BILLS,audit:AUDIT.slice(0,500),deleted:DELETED,nextId}});this.online=true;cacheOps();}catch(e){if(e.offline)this.online=false;throw e;}},
  async upsertUser(user){return (await this.call('upsertUser',{token:TOKEN,user})).users;},
  async deleteUser(u){return (await this.call('deleteUser',{token:TOKEN,u})).users;},
  async syncInvoice(record){return await this.call('syncInvoice',{token:TOKEN,record});},
  async clearBills(){return await this.call('clearBills',{token:TOKEN});},
};

const App={
  state:{view:'dashboard',acct:'all',q:'',billStage:'all',method:'all',month:'all',sortKey:'id',sortDir:'desc',checkTab:'print',vMethod:'all',vStatus:'active',vSort:'name',vDir:'asc'},

  async init(){
    TOKEN=LS.get('aphub_token');
    if(TOKEN){ try{ await this.boot(); return; }catch(e){} }
    TOKEN=null; LS.del('aphub_token'); LS.del('aphub_user'); CURRENT=null;
    this.renderGate();
  },

  /* ---------- auth ---------- */
  renderGate(){
    let g=document.getElementById('gate');
    if(!g){g=document.createElement('div');g.id='gate';document.body.appendChild(g);}
    g.style.cssText='position:fixed;inset:0;z-index:300;display:grid;place-items:center;background:linear-gradient(160deg,#0b1b3a,#081226);padding:20px';
    g.innerHTML=`<div style="width:380px;max-width:100%;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:30px;box-shadow:0 30px 90px rgba(0,0,0,.55)">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
        <div style="width:44px;height:44px;border-radius:12px;background:var(--navy-900);display:grid;place-items:center"><svg viewBox="0 0 24 24" fill="none" width="25" height="25"><path d="M3 14c2.5-1.4 4.5-1.4 6 0 1.5 1.4 3.5 1.4 6 0 1.5-1.4 3.5-1.4 6 0" stroke="#D4AF37" stroke-width="1.6" stroke-linecap="round"/><path d="M6.5 10.5 12 4l5.5 6.5" stroke="#D4AF37" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="11" r="1.4" fill="#D4AF37"/></svg></div>
        <div><div style="font-weight:800;font-size:16px">Captain Jay's</div><div style="font-size:12px;color:var(--ink-3)">AP Hub · Admin Portal</div></div>
      </div>
      <div class="field"><label>Username</label><div class="inp" style="padding:0"><input id="lg_u" autocomplete="off" style="border:none;background:none;width:100%;font:inherit;font-weight:600;padding:10px 12px"></div></div>
      <div class="field"><label>Password</label><div class="inp" style="padding:0"><input id="lg_p" type="password" style="border:none;background:none;width:100%;font:inherit;font-weight:600;padding:10px 12px"></div></div>
      <div id="lg_err" style="color:var(--red);font-size:12.5px;height:16px;margin:2px 0 8px"></div>
      <button class="btn btn-gold" style="width:100%;justify-content:center" onclick="App.login()">Sign in</button>

    $('#lg_p').addEventListener('keydown',e=>{if(e.key==='Enter')this.login();});

  async login(){
    const u=($('#lg_u').value||'').trim(),p=$('#lg_p').value||'';
    const btn=$('#gate .btn-gold'); if(btn){btn.textContent='Signing in…';btn.style.pointerEvents='none';}
    const resetBtn=()=>{if(btn){btn.textContent='Sign in';btn.style.pointerEvents='';}};
    try{
      const user=await API.login(u,p);
      CURRENT=user; this._freshLogin=true;
      await this.boot();
    }catch(e){
      if(e.offline){
        const f=OFFLINE_USERS.find(x=>x.u.toLowerCase()===u.toLowerCase()&&x.p===p);
        if(f){CURRENT=f;API.online=false;const g=document.getElementById('gate');if(g)g.remove();this.updateFoot();this.renderNav();this.go('dashboard');this.toast('Offline preview — changes won’t be saved');}
        else{$('#lg_err').textContent='Incorrect username or password';resetBtn();}
      }else{$('#lg_err').textContent=e.message||'Incorrect username or password';resetBtn();}
    }
  },
  async boot(){
    const su=LS.get('aphub_user');
    CURRENT=su?JSON.parse(su):CURRENT;
    const paint=()=>{const gg=document.getElementById('gate');if(gg)gg.remove();this.updateFoot();this.renderNav();};
    // 1) instant paint from the last server-confirmed snapshot, if we have one
    let painted=false;
    const cache=readCache();
    if(CURRENT&&cache){ applyOps(cache); this.migrateBills(); paint(); this.go('dashboard'); painted=true; }
    // 2) refresh from the server (background if already painted, foreground on first load)
    const refresh=async()=>{
      try{
        const d=await API.load();
        CURRENT=su?JSON.parse(su):CURRENT;
        if(d.ops){ applyOps(d.ops); } else { API.saveOps().catch(()=>{}); }
        if(Array.isArray(d.users))USERS=d.users;
        const mig=this.migrateBills();
        let dirty=mig>0;
        if(this._freshLogin){ this.log('Signed in',ROLES[CURRENT.role]); this._freshLogin=false; dirty=true; }
        cacheOps();
        if(dirty) API.saveOps().catch(()=>{});   // don't block the UI on the save
        API.online=true;
        if(!CURRENT){ this.renderGate(); return; }
        paint(); if(painted){ this.render(); } else { this.go('dashboard'); }
      }catch(e){
        if(e&&e.status===401){TOKEN=null;LS.del('aphub_token');LS.del('aphub_user');LS.del('aphub_ops');CURRENT=null;this.renderGate();return;}
        API.online=false; CURRENT=su?JSON.parse(su):CURRENT;
        if(!CURRENT){ this.renderGate(); return; }
        if(!painted){ paint(); this.go('dashboard'); }
        this.toast('Offline — showing last synced data');
      }
    };
    if(painted){ refresh(); } else { await refresh(); }
  },
  async logout(){ if(CURRENT){ this.log('Signed out',ROLES[CURRENT.role]); try{ await API.saveOps(); }catch(e){} } CURRENT=null;TOKEN=null;LS.del('aphub_token');LS.del('aphub_user');LS.del('aphub_ops');this.closeDrawer();this.renderGate();},
  /* central activity logger (real timestamp) */
  log(act,obj){ AUDIT.unshift({who:CURRENT?CURRENT.name:'System',act,obj:obj||'',at:Date.now()}); if(AUDIT.length>600)AUDIT.length=600; },
  /* log a bill action to BOTH the global activity feed and the item's own history */
  logBill(b,act,detail){ this.log(b?act+' #'+b.id:act,detail); if(b){ (b.history=b.history||[]).push({at:Date.now(),who:CURRENT?CURRENT.name:'System',initials:CURRENT?CURRENT.initials:'',act,detail:detail||''}); if(b.history.length>250)b.history.shift(); } },
  /* MM/DD/YYYY date input helpers */
  fmtDateInput(el){let v=(el.value||'').replace(/\D/g,'').slice(0,8);let out=v;if(v.length>=5)out=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);else if(v.length>=3)out=v.slice(0,2)+'/'+v.slice(2);el.value=out;},
  syncDate(id,iso){const e=document.getElementById(id);if(e)e.value=isoToMDY(iso);},
  /* approval routing helpers — eligible approvers = admins + tier-3 Accounts Payable */
  eligibleApprovers(){return USERS.filter(u=>u.role==='admin'||(u.role==='ap'&&userTier(u)===3));},
  approverOptions(sel){const els=this.eligibleApprovers();if(!els.length)return '<option value="">No eligible approver yet</option>';return els.map(u=>`<option value="${u.u}" ${sel===u.u?'selected':''}>${u.name} · ${ROLES[u.role]}${u.role!=='admin'?' · T'+userTier(u):''}</option>`).join('');},
  canApproveAny(){return !!CURRENT&&(can('approve')||CURRENT.role==='admin'||(CURRENT.role==='ap'&&userTier(CURRENT)===3));},
  canApproveBill(b){if(!CURRENT||!b)return false;if(CURRENT.role==='admin')return true;if(can('approve')&&this.routed(b))return true;if(b.approval&&b.approval.approver===CURRENT.u&&CURRENT.role==='ap'&&userTier(CURRENT)===3)return true;return false;},
  /* normalize bills recorded before the check pipeline existed (no payType) */
  migrateBills(){let n=0;BILLS.forEach(b=>{
    if(b.isChase)return;
    // repair a check that an earlier migration force-marked delivered without running the pipeline
    if(b.payType==='check'&&b.checkStage==='delivered'&&!b.sent&&!b.printed){b.checkStage='print';b.stage='ready';b.paid=null;delete b.delivered;n++;return;}
    if(b.payType||!b.paid)return;
    if(isCheckMethod(b.method)){b.payType='check';b.checkStage='print';b.stage='ready';b.paid=null;delete b.delivered;n++;}
    else if(b.method==='To be Picked Up'){ if(b.pickedUp){b.payType='pickup';b.checkStage='pickedup';} else if(b.paid){b.payType='pickup';b.checkStage='pickup';} else {b.payType=null;b.stage='ready';b.paid=null;} n++; }
    else{b.payType='online';n++;}
  });return n;},
  updateFoot(){const f=$('.nav-foot');if(f)f.innerHTML=`<div class="avatar">${CURRENT.initials}</div><div style="flex:1;min-width:0"><div class="nm">${CURRENT.name}</div><div class="rl">${ROLES[CURRENT.role]}</div></div><button title="Sign out" onclick="App.logout()" style="background:none;border:none;color:var(--ink-3);cursor:pointer;padding:4px">${svg(ICN.logout,16)}</button>`;},

  mine(b){return CURRENT.role==='admin'||can('view_all')?true:b.enteredBy===CURRENT.u;},
  routed(b){if(CURRENT.role==='admin')return true;return !b.approval||!b.approval.approver||b.approval.approver===CURRENT.u;},

  /* ---- shared sorting / filtering / export ---- */
  statusText(b){const m=b.isChase?CHASE_STAGES[b.chaseStage]:b.payType==='pickup'?PICKUP_STAGES[b.checkStage]:b.payType==='check'?CHECK_STAGES[b.checkStage]:STAGES[b.stage];return (m&&m[1])||'—';},
  statusKey(b){if(b.isChase)return 'chase_'+(b.chaseStage||'?');if(b.payType==='pickup')return 'pickup_'+(b.checkStage||'?');if(b.payType==='check')return 'check_'+(b.checkStage||'?');return 'stage_'+(b.stage||'?');},
  setSort(k){const s=this.state;if(s.sortKey===k){s.sortDir=s.sortDir==='asc'?'desc':'asc';}else{s.sortKey=k;s.sortDir='asc';}this.render();},
  sortHdr(key,label,cls){const s=this.state;const on=s.sortKey===key;const ar=on?(s.sortDir==='asc'?' ▲':' ▼'):'';return `<th class="${cls||''}" data-sort="${key}" style="cursor:pointer;user-select:none;white-space:nowrap">${label}${ar}</th>`;},
  applySort(rows){return sortBy(rows,this.state.sortKey,this.state.sortDir);},
  monthsList(){const set={};BILLS.forEach(b=>{const mk=monthKey(b.receivedDate);if(mk)set[mk]=1;});return Object.keys(set).sort().reverse();},
  monthLabel(mk){if(!mk)return '';const p=mk.split('-');return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][(+p[1])-1]+' '+p[0];},
  matchBill(b){const s=this.state;const q=(s.q||'').toLowerCase();
    if(s.acct!=='all'&&b.account!==s.acct)return false;
    if(s.method!=='all'&&(b.method||'')!==s.method)return false;
    if(s.month!=='all'&&monthKey(b.receivedDate)!==s.month)return false;
    if(q){const qn=q.replace(/[\s-]/g,'');const v=vendor(b.vendor);const acctHit=v&&v.accounts&&Object.values(v.accounts).some(no=>{const s=String(no).toLowerCase();return s.includes(q)||s.replace(/[\s-]/g,'').includes(qn);});
      if(!(String(b.id).includes(q)||(b.vendor||'').toLowerCase().includes(q)||(b.inv||'').toLowerCase().includes(q)||(b.account||'').toLowerCase().includes(q)||String(b.checkNumber||'').toLowerCase().includes(q)||acctHit))return false;}
    return true;},
  filterControls(withStatus){const s=this.state;
    const acctOpts=['<option value="all">All accounts</option>',...ACCOUNTS.map(a=>`<option ${s.acct===a.code?'selected':''} value="${a.code}">${a.code}</option>`)].join('');

    const statusGroups=[
      ['General',[['stage_submission','Pending Submission'],['stage_pending','Pending approval'],['stage_ready','Ready for payment'],['stage_paid','Paid'],['stage_rejected','Rejected']]],
      ['Checks (mailed)',[['check_print','To print'],['check_cut','To cut'],['check_send','To send'],['check_transit','On the way'],['check_delivered','Payment delivered']]],
      ['Pickups (collected)',[['pickup_cut','To cut'],['pickup_pickup','Ready for pickup'],['pickup_pickedup','Picked up']]],
      ['Chase (deposited)',[['chase_print','Chase · to print'],['chase_cut','Chase · to cut'],['chase_deposit','Chase · to deposit'],['chase_closed','Chase · deposited']]],
    ];
    const statusSel=withStatus?`<select class="selent" data-stage><option value="all">All statuses</option>${statusGroups.map(([g,opts])=>`<optgroup label="${g}">${opts.map(([k,l])=>`<option ${s.billStage===k?'selected':''} value="${k}">${l}</option>`).join('')}</optgroup>`).join('')}</select>`:'';
    return `<select class="selent" data-acct>${acctOpts}</select><select class="selent" data-method>${methodOpts}</select>${statusSel}<select class="selent" data-month>${monthOpts}</select>`;},
  exportXlsx(rows,name){
    if(typeof XLSX==='undefined'){this.toast('Excel export is still loading — try again in a moment');return;}
    const data=rows.map(b=>({ID:b.id,Vendor:b.vendor,Account:b.account,Invoice:b.inv,Amount:+b.amount||0,Method:b.method||'',Status:this.statusText(b),'Check #':b.checkNumber||(b.isChase?b.tracking:'')||'',GL:b.gl||'',Received:fmtD(b.receivedDate),Due:b.due?fmtD(b.due):'','Send by':b.due?fmtD(sendByISO(b.due)):'','Paid/Delivered':b.paid?fmtD(b.paid.date):(b.delivered?fmtD(b.delivered.date):''),'By':(b.paid&&b.paid.initials)||(b.delivered&&b.delivered.initials)||'',Link:b.link||''}));
    const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Bills');XLSX.writeFile(wb,name+'-'+todayISO+'.xlsx');this.toast('Exported '+rows.length+' rows to Excel');},

  render(){if(!CURRENT)return;
    const titles={dashboard:['Dashboard',CURRENT.name+' · '+ROLES[CURRENT.role]],submissions:['Submissions','Trainee entries awaiting submit'],
      approvals:['Approvals','Bills routed to you for sign-off'],bills:['All bills','Every bill across its lifecycle'],
      payments:['Payments','All payments — make payment & track status'],checks:['Checks Processing','Print, cut, then deposit Chase checks'],tracking:['Tracking','Checks to mail — sent & delivery status'],pickups:['Pickups','Checks to be collected'],
      vendors:['Vendors','Master list · active & inactive'],accounts:['Accounts','Store & entity codes'],users:['Users','Logins & access'],activity:['Activity','Logins & every action — saved'],deleted:['Deleted','Recoverable — admin only']};
    $('#vTitle').textContent=(titles[this.state.view]||[''])[0];
    $('#vSub').textContent=(titles[this.state.view]||['',''])[1];
    const nb=$('.topbar .btn-gold');if(nb)nb.style.display=can('create')?'':'none';

  },

  /* ---------- DASHBOARD (live command center) ---------- */
  v_dashboard(){
    const ready=BILLS.filter(b=>b.stage==='ready'&&!b.payType&&!b.isChase);
    const urgent=ready.filter(b=>sendUrgency(b).level!=='none');
    const pendApproval=BILLS.filter(b=>b.stage==='pending').length;
    const submissions=BILLS.filter(b=>b.stage==='submission').length;
    const toPrint=BILLS.filter(b=>(b.isChase&&b.chaseStage==='print')||(b.payType==='check'&&b.checkStage==='print'));
    const toCut=BILLS.filter(b=>(b.isChase&&b.chaseStage==='cut')||(b.payType==='check'&&b.checkStage==='cut'));
    const toSend=BILLS.filter(b=>!b.isChase&&b.payType==='check'&&b.checkStage==='send');
    const inTransit=BILLS.filter(b=>!b.isChase&&b.payType==='check'&&b.checkStage==='transit');
    const missingTrack=inTransit.filter(b=>!(b.sent&&b.sent.tracking));
    const overdueTrack=missingTrack.filter(b=>{const d=b.sent?daysUntil(b.sent.date):null;return d!==null&&d<=-2;});
    const chaseDep=BILLS.filter(b=>b.isChase&&b.chaseStage==='deposit');
    const sum=a=>a.reduce((s,b)=>s+(+b.amount||0),0);
    const recorded=BILLS.filter(b=>b.paid&&!b.isChase).slice().sort((a,b)=>((b.paid.date)||'').localeCompare((a.paid.date)||'')||b.id-a.id).slice(0,6);
    const cmk=monthKey(todayISO),pmk=prevMonthKey(todayISO);
    const combos={};BILLS.filter(b=>!b.isChase&&monthKey(b.receivedDate)===cmk).forEach(b=>{combos[b.vendor+'|'+b.account]=1;});
    const spikes=Object.keys(combos).map(k=>{const i=k.indexOf('|'),vn=k.slice(0,i),acct=k.slice(i+1);const last=monthTotal(vn,acct,pmk),curr=monthTotal(vn,acct,cmk);return{vn,acct,last,curr,pct:last>0?(curr-last)/last*100:0};}).filter(x=>x.last>0&&x.pct>3).sort((a,b)=>b.pct-a.pct).slice(0,6);
    // vendor send-readiness: ready-to-send vs still-in-processing, by vendor
    const vr={};[...toSend,...toPrint,...toCut].filter(b=>!b.isChase).forEach(b=>{vr[b.vendor]=vr[b.vendor]||{ready:0,proc:0};if(b.checkStage==='send')vr[b.vendor].ready++;else vr[b.vendor].proc++;});
    const readiness=Object.entries(vr).filter(([,v])=>v.ready>0||v.proc>0).sort((a,b)=>b[1].ready-a[1].ready).slice(0,7);
    const active=VENDORS.filter(v=>v.active).length;
    const kpi=(ic,bg,col,val,lab,go)=>`<div class="kpi" ${go?`data-go="${go}" style="cursor:pointer"`:''}><div class="ic" style="background:${bg};color:${col}">${svg(ICN[ic],17)}</div><div class="v">${val}</div><div class="l">${lab}</div></div>`;
    return `
    <div class="kpis" style="grid-template-columns:repeat(5,1fr)">
      ${kpi('truck',toSend.length?'rgba(217,119,6,.12)':'var(--surface-2)',toSend.length?'var(--amber)':'var(--ink-2)',toSend.length,'To be sent','tracking')}
      ${kpi('check','var(--amber-bg)','var(--amber)',pendApproval,'Pending approval','approvals')}
      ${kpi('card','var(--blue-bg)','var(--blue)',ready.length,'Ready for payment','payments')}
      ${kpi('check','#eef2ff','#4f46e5',toPrint.length+toCut.length,'Checks to process','checks')}
      ${kpi('dollar','#efe9fb','#7c3aed',money(sum(chaseDep)),'Chase to deposit','checks')}
    </div>
    ${overdueTrack.length?`<div class="card" style="margin-bottom:18px;border-left:3px solid var(--red);background:rgba(220,38,38,.05)"><div style="padding:12px 18px"><div style="font-size:13px;display:flex;gap:8px;align-items:center;margin-bottom:8px">${svg(ICN.bolt,15)}<b style="color:var(--red)">${overdueTrack.length} sent check${overdueTrack.length!==1?'s':''} with no tracking # for over a day</b><button class="btn btn-ghost btn-sm" data-go="tracking" style="margin-left:auto">Add tracking # ${svg(ICN.arrow,13)}</button></div><div style="display:flex;flex-direction:column;gap:4px">${overdueTrack.slice(0,5).map(b=>`<div class="click" data-bill="${b.id}" style="display:flex;align-items:center;gap:10px;font-size:12.5px;cursor:pointer;padding:3px 0"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><b>${b.vendor}</b> · ${b.account} · check ${b.checkNumber||'—'}</span><span class="badge b-red" style="font-size:9px;padding:1px 6px">sent ${b.sent?fmtD(b.sent.date):''}</span><span class="mono" style="font-weight:600">${money(b.amount)}</span></div>`).join('')}</div></div></div>`:(missingTrack.length?`<div class="card" style="margin-bottom:18px;border-left:3px solid var(--amber)"><div style="padding:12px 18px;font-size:13px;display:flex;gap:8px;align-items:center">${svg(ICN.truck,15)}<b>${missingTrack.length}</b> sent check${missingTrack.length!==1?'s':''} still need a tracking # <span style="color:var(--ink-3)">· flagged red after a day</span><button class="btn btn-ghost btn-sm" data-go="tracking" style="margin-left:auto">Tracking ${svg(ICN.arrow,13)}</button></div></div>`:'')}
    ${inTransit.length?`<div class="card" style="margin-bottom:18px;border-left:3px solid var(--amber)"><div style="padding:12px 18px;font-size:13px;display:flex;gap:8px;align-items:center">${svg(ICN.truck,15)}<b>${inTransit.length}</b> check${inTransit.length!==1?'s':''} on the way${' '}— <span style="color:var(--ink-3)">awaiting delivery confirmation.</span> <button class="btn btn-ghost btn-sm" data-go="tracking" style="margin-left:auto">Tracking ${svg(ICN.arrow,13)}</button></div></div>`:''}
    <div class="grid-2">
      <div class="card"><div class="card-h"><h3>To be sent today</h3><span class="sub">hold if related invoices still open</span></div>
        <div class="tablewrap"><table><thead><tr><th>Vendor</th><th>Account</th><th class="r">Amount</th><th>Check #</th></tr></thead>
        <tbody>${toSend.length?toSend.slice(0,8).map(b=>`<tr class="click" data-bill="${b.id}"><td><div class="vendorcell"><div class="vlogo" style="width:26px;height:26px;font-size:10px">${abbr(b.vendor)}</div><div class="vmeta"><b style="font-size:12.5px">${b.vendor}</b></div></div></td><td><span class="entity-chip"><span class="pin"></span>${b.account}</span></td><td class="r mono" style="font-weight:600">${money(b.amount)}</td><td class="mono" style="font-size:12px">${b.checkNumber||'—'}</td></tr>`).join(''):`<tr><td colspan="4"><div class="empty">${svg(ICN.check,28)}<div>Nothing waiting to mail.</div></div></td></tr>`}</tbody></table></div>
        ${readiness.length?`<div style="padding:10px 18px 14px;border-top:1px solid var(--line-2)"><div style="font-size:11px;color:var(--ink-3);margin-bottom:6px">Vendor readiness</div>${readiness.map(([vn,v])=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${vn}</span>${v.ready?`<span class="badge b-amber" style="font-size:9px;padding:1px 6px">${v.ready} ready</span>`:''}${v.proc?`<span class="badge b-gray" style="font-size:9px;padding:1px 6px">${v.proc} not ready</span>`:''}</div>`).join('')}</div>`:''}
      </div>
      <div class="card"><div class="card-h"><h3>Checks Processing</h3><button class="btn btn-ghost btn-sm" data-go="checks">Open ${svg(ICN.arrow,13)}</button></div>
        <div style="padding:16px 18px;display:flex;gap:22px;flex-wrap:wrap">
          <div><div class="mono" style="font-size:22px;font-weight:700;color:var(--blue)">${toPrint.length}</div><div style="font-size:12px;color:var(--ink-3)">to print</div></div>
          <div><div class="mono" style="font-size:22px;font-weight:700;color:#7c3aed">${toCut.length}</div><div style="font-size:12px;color:var(--ink-3)">to cut</div></div>
          <div><div class="mono" style="font-size:22px;font-weight:700;color:var(--amber)">${chaseDep.length}</div><div style="font-size:12px;color:var(--ink-3)">Chase to deposit</div></div>
        </div>
        <div style="padding:2px 18px 16px">${urgent.length?`<div style="font-size:11px;color:var(--ink-3);margin-bottom:6px">Ready &amp; getting urgent</div>`+urgent.slice(0,4).map(b=>`<div class="click" data-bill="${b.id}" style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line-2);font-size:13px;cursor:pointer"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.vendor}</span>${urgencyChip(b)}<span class="mono" style="font-weight:600">${money(b.amount)}</span></div>`).join(''):'<div style="color:var(--ink-3);font-size:13px">Nothing urgent in the ready queue.</div>'}</div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-h"><h3>Watch · up vs last month</h3><span class="sub">&gt;3%</span></div>
        <div style="padding:6px 18px 16px">${spikes.length?spikes.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line-2);font-size:13px"><div class="vlogo" style="width:26px;height:26px;font-size:10px">${abbr(s.vn)}</div><div style="flex:1;min-width:0"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.vn}</div><div style="font-size:11px;color:var(--ink-3)">acct ${s.acct} · ${money(s.last)} → ${money(s.curr)}</div></div><span class="badge b-red"><span class="dot"></span>+${s.pct.toFixed(0)}%</span></div>`).join(''):`<div style="color:var(--ink-3);font-size:13px;padding:8px 0">No vendors over 3% vs last month.</div>`}</div>
      </div>
      <div class="card"><div class="card-h"><h3>Recently paid</h3><button class="btn btn-ghost btn-sm" data-go="payments">All ${svg(ICN.arrow,13)}</button></div>
        <div style="padding:6px 18px 16px">${recorded.length?recorded.map(b=>`<div class="click" data-bill="${b.id}" style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line-2);font-size:13px;cursor:pointer"><div class="vlogo" style="width:26px;height:26px;font-size:10px">${abbr(b.vendor)}</div><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.vendor}</span><span style="font-size:11px;color:var(--ink-3)">${fmtD(b.paid.date)} · ${b.paid.initials}</span><span class="mono" style="font-weight:600">${money(b.amount)}</span></div>`).join(''):`<div style="color:var(--ink-3);font-size:13px;padding:8px 0">No payments yet.</div>`}</div>
      </div>
    </div>
    <div class="card"><div class="card-h"><h3>Vendors</h3><span class="sub">${active} active · ${VENDORS.length-active} inactive · ${submissions} pending submission</span></div>
      <div style="padding:14px 18px;font-size:12px;color:var(--ink-3);display:flex;gap:12px;align-items:center;flex-wrap:wrap"><button class="btn btn-ghost btn-sm" data-go="vendors">Manage vendors ${svg(ICN.arrow,13)}</button><span style="display:flex;gap:6px;align-items:center">${svg(ICN.clock,12)} Chase card statement closes the 17th.</span></div>
    </div>`;
  },

        <td class="r"><button class="btn btn-gold btn-sm" data-approvesub="${b.id}">${svg(ICN.check,13)} Approve</button></td>
      </tr>`).join(''):`<tr><td colspan="9"><div class="empty">${svg(ICN.inbox,30)}<div style="margin-bottom:12px">No submissions waiting. Trainee entries land here for anyone to approve.</div>${can('create')?`<button class="btn btn-gold btn-sm" data-new style="margin:0 auto">${svg(ICN.plus,14)} Enter a bill</button>`:''}</div></td></tr>`}</tbody>
    </table></div></div>`;

  /* ---------- APPROVALS ---------- */
  v_approvals(){
    const rows=BILLS.filter(b=>b.stage==='pending'&&this.canApproveBill(b));

      <div class="tablewrap"><table><thead><tr><th>ID</th><th>Vendor</th><th>Account</th><th class="r">Amount</th><th>Approver</th><th class="r"></th></tr></thead>
      <tbody>${rows.length?rows.map(b=>`<tr class="click" data-bill="${b.id}"><td class="mono" style="font-weight:700">#${b.id}</td><td><div class="vendorcell"><div class="vlogo">${abbr(b.vendor)}</div><div class="vmeta"><b>${b.vendor}</b><span>${invOf(b)}</span></div></div></td><td><span class="entity-chip"><span class="pin"></span>${b.account}</span></td><td class="r mono" style="font-weight:600">${money(b.amount)}</td><td style="font-size:12.5px">${b.approval&&b.approval.approver?(USERS.find(u=>u.u===b.approval.approver)||{}).name||b.approval.approver:'Any'}</td><td class="r"><button class="btn btn-gold btn-sm" data-approve="${b.id}">${svg(ICN.check,13)} Review</button></td></tr>`).join(''):`<tr><td colspan="6"><div class="empty">${svg(ICN.check,30)}<div>Nothing waiting on you.</div></div></td></tr>`}</tbody></table></div>

    </div>`;

        <td>${statusBadge(b)}</td>
        <td class="mono" style="font-size:12px">${b.checkNumber||(b.isChase&&b.tracking)||'—'}</td>
        <td class="mono" style="font-size:12px;color:var(--ink-2)">${b.due?fmtD(b.due):'—'}</td>

        <td style="font-size:12px">${(b.paid&&b.paid.initials)||(b.delivered&&b.delivered.initials)||'—'}</td>

  /* ---------- PAYMENTS (all payments — make payment & track) ---------- */
  v_payments(){
    const ready=BILLS.filter(b=>b.stage==='ready'&&!b.payType&&!b.isChase);
    const pendChecks=BILLS.filter(b=>!b.isChase&&((b.payType==='check'&&(b.checkStage==='cut'||b.checkStage==='send'))||(b.payType==='pickup'&&b.checkStage==='cut')));
    const rank=b=>{const u=sendUrgency(b);return u.level==='red'?0:u.level==='amber'?1:2;};
    ready.sort((a,b)=>{const r=rank(a)-rank(b);if(r)return r;const da=daysUntil(sendByISO(a.due)),db=daysUntil(sendByISO(b.due));return (da===null?9999:da)-(db===null?9999:db);});
    const pending=[...ready,...pendChecks];
    // vendors that have 2+ unpaid 'ready' bills → offer batch pay
    const vgroups={};ready.forEach(b=>{(vgroups[b.vendor]=vgroups[b.vendor]||[]).push(b);});
    const batchable=Object.entries(vgroups).filter(([v,arr])=>arr.length>1).sort((a,b)=>b[1].length-a[1].length);
    let allp=BILLS.filter(b=>this.matchBill(b)&&(b.paid||b.payType==='check'||b.isChase));
    allp=this.applySort(allp);
    const rowBg=b=>{const u=sendUrgency(b);return u.level==='red'?'background:rgba(220,38,38,.06)':u.level==='amber'?'background:rgba(217,119,6,.06)':'';};
    const nextAction=b=>{
      if(!b.payType)return `<button class="btn btn-gold" data-record="${b.id}" style="flex-shrink:0">${svg(ICN.dollar,15)} Pay Bill</button>`;
      if(b.checkStage==='cut')return `<button class="btn btn-gold" data-cut="${b.id}" style="flex-shrink:0">${svg(ICN.check,15)} Mark Cut</button>`;
      if(b.checkStage==='send')return `<button class="btn btn-gold" data-send="${b.id}" style="flex-shrink:0">${svg(ICN.truck,15)} Send</button>`;
      return '';
    };
    const card=b=>`<div class="card" style="${rowBg(b)}"><div style="padding:14px 16px;display:flex;align-items:center;gap:14px">
        <div class="vlogo" style="width:40px;height:40px;border-radius:11px;flex-shrink:0">${abbr(b.vendor)}</div>
        <div class="click" data-bill="${b.id}" style="flex:1;min-width:0;cursor:pointer">
          <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap"><span style="font-size:22px;font-weight:800;color:var(--ink-1)">${money(b.amount)}</span><span class="entity-chip"><span class="pin"></span>${b.account}</span><b style="font-size:14px;color:var(--ink-1)">${b.vendor}</b>${b.payType==='check'?statusBadge(b):''}</div>
          <div style="font-size:12px;color:var(--ink-3);margin-top:2px">Invoice ${invOf(b)} · ${b.method||'method set at payment'}${b.checkNumber?' · check '+b.checkNumber:''}${b.due?' · due '+fmtD(b.due):''} ${urgencyChip(b)}</div>
        </div>
        ${can('record')?nextAction(b):''}
      </div></div>`;
    return `
    <div class="card" style="margin-bottom:18px;background:linear-gradient(180deg,var(--surface),var(--surface-2))"><div class="card-h"><h3>Pending payment</h3><span class="sub">${pending.length} · checks stay here until sent</span></div>
      ${can('record')&&batchable.length?`<div style="padding:12px 16px 2px;display:flex;flex-wrap:wrap;gap:8px">${batchable.map(([v,arr])=>`<button class="btn btn-ghost btn-sm" style="border:1px dashed var(--gold);color:var(--ink-1)" onclick="App.openBatchPay('${v.replace(/'/g,"\\'")}')">${svg(ICN.dollar,13)} Pay all ${v} <b>(${arr.length})</b> · ${money(arr.reduce((s,b)=>s+(+b.amount||0),0))}</button>`).join('')}</div>`:''}

    </div>
    <div class="filters">
      ${this.filterControls(false)}
      <div style="margin-left:auto;display:flex;gap:10px;align-items:center"><span style="color:var(--ink-3);font-size:13px">${allp.length} payment${allp.length!==1?'s':''}</span>${CURRENT.role==='admin'?`<button class="btn btn-ghost btn-sm" data-export="payments">${svg(ICN.bills,14)} Export Excel</button>`:''}</div>
    </div>
    <div class="card"><div class="card-h"><h3>All payments</h3><span class="sub">paid, in process & Chase</span></div>
      <div class="tablewrap"><table><thead><tr>${this.sortHdr('id','ID')}${this.sortHdr('vendor','Vendor')}${this.sortHdr('account','Account')}${this.sortHdr('amount','Amount','r')}${this.sortHdr('method','Method')}${this.sortHdr('status','Status')}${this.sortHdr('check','Check #')}${this.sortHdr('date','Date')}<th>By</th></tr></thead>
      <tbody>${allp.length?allp.map(b=>`<tr class="click" data-bill="${b.id}">
        <td class="mono" style="font-weight:700">#${b.id}</td>
        <td><div class="vendorcell"><div class="vlogo">${abbr(b.vendor)}</div><div class="vmeta"><b>${b.vendor}</b><span>${b.gl||'—'}</span></div></div></td>
        <td><span class="entity-chip clickacct" data-acct-set="${b.account}" style="cursor:pointer"><span class="pin"></span>${b.account}</span></td>
        <td class="r mono" style="font-weight:600">${money(b.amount)}</td>
        <td style="font-size:12.5px">${b.method||'—'}${b.paidViaChase?' <span class="badge b-violet" style="font-size:9px;padding:1px 6px">CHASE</span>':''}</td>
        <td>${statusBadge(b)}</td>
        <td class="mono" style="font-size:12px">${b.checkNumber||(b.isChase&&b.tracking)||'—'}</td>
        <td class="mono" style="font-size:12px;color:var(--ink-2)">${b.paid?fmtD(b.paid.date):(b.delivered?fmtD(b.delivered.date):(b.printed?fmtD(b.printed.date):'—'))}</td>
        <td style="font-size:12px">${(b.paid&&b.paid.initials)||(b.delivered&&b.delivered.initials)||(b.printed&&b.printed.initials)||'—'}</td>
      </tr>`).join(''):`<tr><td colspan="9"><div class="empty">${svg(ICN.check,30)}<div>No payments yet.</div></div></td></tr>`}</tbody></table></div>
    </div>`;
  },

  /* ---------- PICKUPS (printed → cut → ready for pickup → picked up) ---------- */
  v_pickups(){
    const processing=BILLS.filter(b=>b.payType==='pickup'&&b.checkStage==='cut');
    const ready=BILLS.filter(b=>b.payType==='pickup'&&b.checkStage==='pickup');
    const done=BILLS.filter(b=>b.payType==='pickup'&&b.checkStage==='pickedup');

    return `
    <div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Ready for pickup</h3><span class="sub">${ready.length} waiting · ${money(sum(ready))}</span></div>
      <div class="tablewrap"><table><thead><tr><th>ID</th><th>Vendor</th><th>Account</th><th class="r">Amount</th><th>Check #</th><th>Cut by</th><th class="r"></th></tr></thead>
      <tbody>${ready.length?ready.map(b=>`<tr class="click" data-bill="${b.id}"><td class="mono" style="font-weight:700">#${b.id}</td><td><div class="vendorcell"><div class="vlogo">${abbr(b.vendor)}</div><div class="vmeta"><b>${b.vendor}</b><span>${b.gl||b.account}</span></div></div></td><td><span class="entity-chip"><span class="pin"></span>${b.account}</span></td><td class="r mono" style="font-weight:600">${money(b.amount)}</td><td class="mono" style="font-size:12px">${b.checkNumber||'—'}</td><td style="font-size:12px">${b.cut?b.cut.initials+' · '+fmtD(b.cut.date):'—'}</td><td class="r">${can('pickup')?`<button class="btn btn-gold btn-sm" data-pickup="${b.id}">${svg(ICN.truck,14)} Mark picked up</button>`:''}</td></tr>`).join(''):`<tr><td colspan="7"><div class="empty">${svg(ICN.truck,30)}<div>No checks waiting for pickup. They appear here once printed &amp; cut.</div></div></td></tr>`}</tbody></table></div>
    </div>
    ${processing.length?`<div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Being prepared</h3><span class="sub">${processing.length} · in Checks Processing (to cut)</span></div>
      <div class="tablewrap"><table><thead><tr><th>ID</th><th>Vendor</th><th>Account</th><th class="r">Amount</th><th>Check #</th><th>Status</th></tr></thead>

      <tbody>${done.length?done.map(b=>`<tr class="click" data-bill="${b.id}"><td class="mono" style="font-weight:700">#${b.id}</td><td>${b.vendor}</td><td class="r mono" style="font-weight:600">${money(b.amount)}</td><td class="mono" style="font-size:12px">${b.checkNumber||'—'}</td><td class="mono" style="font-size:12px">${b.pickedUp?fmtD(b.pickedUp.date):'—'}</td><td>${b.pickedUp?b.pickedUp.initials:'—'}</td></tr>`).join(''):`<tr><td colspan="6"><div class="empty">${svg(ICN.truck,30)}<div>Nothing picked up yet.</div></div></td></tr>`}</tbody></table></div>
    </div>`;
  },

  /* ---------- CHECKS PROCESSING (print[Chase] → cut → send → deposit[Chase]) ---------- */
  v_checks(){
    const tab=this.state.checkTab||'cut';
    const toPrint=[...BILLS.filter(b=>b.isChase&&b.chaseStage==='print'),...BILLS.filter(b=>b.payType==='check'&&b.checkStage==='print')];

    const toSend=BILLS.filter(b=>!b.isChase&&b.payType==='check'&&b.checkStage==='send');

    const sum=a=>a.reduce((s,b)=>s+(+b.amount||0),0);
    const tabs=[['cut','To Cut',toCut.length],['send','To Send',toSend.length],['print','To Print · Chase',toPrint.length],['deposit','To Deposit · Chase',toDep.length]];
    const tabBar=`<div class="filters" style="gap:8px;flex-wrap:wrap">${tabs.map(([k,l,n])=>`<button class="btn ${tab===k?'btn-gold':'btn-ghost'} btn-sm" data-checktab="${k}">${l}${n?` <span style="opacity:.7">(${n})</span>`:''}</button>`).join('')}<div style="margin-left:auto;font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:6px">${svg(ICN.bolt,12)} One step per click · batches of ${CHECK_BATCH}</div></div>`;

      <tbody>${toPrint.length?toPrint.map(b=>`<tr class="click" data-bill="${b.id}"><td>${nameCell(b)}</td><td><span class="entity-chip"><span class="pin"></span>${b.account}</span></td><td class="r mono" style="font-weight:700">${money(b.amount)}</td><td style="font-size:12px">${b.isChase?'<span class="badge b-violet" style="font-size:9px;padding:1px 6px">CHASE</span>':b.method}</td><td class="r">${can('record')?`<button class="btn btn-gold btn-sm" data-print="${b.id}">${svg(ICN.check,13)} Print check</button>`:''}</td></tr>`).join(''):`<tr><td colspan="5"><div class="empty">${svg(ICN.check,30)}<div>No Chase checks to print. Regular checks are printed from <b>Pay Bill</b> and arrive in To Cut.</div></div></td></tr>`}</tbody></table></div></div>`;
    } else if(tab==='cut'){
      body=`<div class="card"><div class="card-h"><h3>Checks to be Cut</h3><span class="sub">${money(sum(toCut))} · ${toCut.length}</span></div>
      <div class="tablewrap"><table><thead><tr><th>Type</th><th>Account</th><th class="r">Amount</th><th>Check #</th><th>Batch</th><th>Printed by</th><th class="r"></th></tr></thead>
      <tbody>${toCut.length?toCut.map(b=>`<tr class="click" data-bill="${b.id}"><td>${nameCell(b)}${b.payType==='pickup'?' <span class="badge b-amber" style="font-size:9px;padding:1px 6px">PICKUP</span>':''}</td><td><span class="entity-chip"><span class="pin"></span>${b.account}</span></td><td class="r mono" style="font-weight:700">${money(b.amount)}</td><td class="mono" style="font-size:12px">${b.checkNumber||'—'}</td><td class="mono" style="font-size:12px">${b.printed&&b.printed.batch?'#'+b.printed.batch:'—'}</td><td style="font-size:12px">${b.printed?b.printed.initials+' · '+fmtD(b.printed.date):'—'}</td><td class="r">${can('record')?`<button class="btn btn-gold btn-sm" data-cut="${b.id}">${svg(ICN.check,13)} Mark Cut</button>`:''}</td></tr>`).join(''):`<tr><td colspan="7"><div class="empty">${svg(ICN.check,30)}<div>Nothing waiting to cut.</div></div></td></tr>`}</tbody></table></div></div>`;
    } else if(tab==='send'){
      body=`<div class="card"><div class="card-h"><h3>To Send</h3><span class="sub">${money(sum(toSend))} · ${toSend.length}</span></div>
      <div class="tablewrap"><table><thead><tr><th>Vendor</th><th>Account</th><th class="r">Amount</th><th>Check #</th><th>Cut by</th><th class="r"></th></tr></thead>
      <tbody>${toSend.length?toSend.map(b=>`<tr class="click" data-bill="${b.id}"><td>${nameCell(b)}</td><td><span class="entity-chip"><span class="pin"></span>${b.account}</span></td><td class="r mono" style="font-weight:700">${money(b.amount)}</td><td class="mono" style="font-size:12px">${b.checkNumber||'—'}</td><td style="font-size:12px">${b.cut?b.cut.initials+' · '+fmtD(b.cut.date):'—'}</td><td class="r">${can('record')?`<button class="btn btn-gold btn-sm" data-send="${b.id}">${svg(ICN.truck,13)} Send</button>`:''}</td></tr>`).join(''):`<tr><td colspan="6"><div class="empty">${svg(ICN.truck,30)}<div>Nothing ready to send. Cut checks land here (also in Tracking).</div></div></td></tr>`}</tbody></table></div></div>`;
    } else {
      const byStore={};toDep.forEach(ch=>{(byStore[ch.account]=byStore[ch.account]||[]).push(ch);});
      const blocks=Object.keys(byStore).sort().map(store=>{const list=byStore[store];return `<div class="card" style="margin-bottom:14px"><div class="card-h"><h3>Store ${store}</h3><span class="sub">${list.length} check${list.length!==1?'s':''} · ${money(sum(list))}</span></div>

      body=blocks||`<div class="card"><div class="tablewrap"><table><tbody><tr><td><div class="empty">${svg(ICN.check,30)}<div>No Chase checks waiting to deposit. They arrive here once cut.</div></div></td></tr></tbody></table></div></div>`;
    }
    return tabBar+body;
  },

  /* ---------- TRACKING (mail non-Chase checks) ---------- */
  v_tracking(){
    const toSend=BILLS.filter(b=>!b.isChase&&b.payType==='check'&&b.checkStage==='send');
    const transit=BILLS.filter(b=>!b.isChase&&b.payType==='check'&&b.checkStage==='transit');
    const delivered=BILLS.filter(b=>!b.isChase&&b.payType==='check'&&b.checkStage==='delivered').slice().sort((a,b)=>((b.delivered&&b.delivered.date)||'').localeCompare((a.delivered&&a.delivered.date)||''));
    const proc=BILLS.filter(b=>!b.isChase&&b.payType==='check'&&(b.checkStage==='print'||b.checkStage==='cut'));
    // vendor readiness: ready (to send) vs not ready (still printing/cutting)
    const vr={};[...toSend,...proc].forEach(b=>{vr[b.vendor]=vr[b.vendor]||{ready:0,proc:0};if(b.checkStage==='send')vr[b.vendor].ready++;else vr[b.vendor].proc++;});
    const readiness=Object.entries(vr).sort((a,b)=>b[1].ready-a[1].ready);
    const sum=a=>a.reduce((s,b)=>s+(+b.amount||0),0);
    return `
    ${readiness.length?`<div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Vendor readiness</h3><span class="sub">hold a vendor until all its checks are ready</span></div>
      <div style="padding:12px 18px;display:flex;flex-direction:column;gap:6px">${readiness.map(([vn,v])=>`<div style="display:flex;align-items:center;gap:10px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line-2)"><div class="vlogo" style="width:24px;height:24px;font-size:9px">${abbr(vn)}</div><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><b>${vn}</b></span>${v.ready?`<span class="badge b-amber" style="font-size:9px;padding:1px 7px">${v.ready} ready to send</span>`:''}${v.proc?`<span class="badge b-gray" style="font-size:9px;padding:1px 7px">${v.proc} not printed/cut yet — not ready</span>`:'<span class="badge b-green" style="font-size:9px;padding:1px 7px">all ready</span>'}</div>`).join('')}</div></div>`:''}
    <div class="card" style="margin-bottom:18px"><div class="card-h"><h3>To be sent out</h3><span class="sub">${money(sum(toSend))} · ${toSend.length}</span></div>
      <div class="tablewrap"><table><thead><tr><th>Vendor</th><th>Account</th><th class="r">Amount</th><th>Check #</th><th>Batch</th><th class="r"></th></tr></thead>
      <tbody>${toSend.length?toSend.map(b=>`<tr class="click" data-bill="${b.id}"><td><div class="vendorcell"><div class="vlogo">${abbr(b.vendor)}</div><div class="vmeta"><b>${b.vendor}</b><span>${invOf(b)}</span></div></div></td><td><span class="entity-chip"><span class="pin"></span>${b.account}</span></td><td class="r mono" style="font-weight:700">${money(b.amount)}</td><td class="mono" style="font-size:12px">${b.checkNumber||'—'}</td><td class="mono" style="font-size:12px">${b.printed&&b.printed.batch?'#'+b.printed.batch:'—'}</td><td class="r"><button class="btn btn-gold btn-sm" data-send="${b.id}">${svg(ICN.truck,13)} Mark Sent</button></td></tr>`).join(''):`<tr><td colspan="6"><div class="empty">${svg(ICN.truck,30)}<div>Nothing ready to mail. Cut checks land here.</div></div></td></tr>`}</tbody></table></div>
    </div>
    <div class="card" style="margin-bottom:18px"><div class="card-h"><h3>On the way</h3><span class="sub">${transit.length} · add USPS tracking #, then delivered date</span></div>
      <div class="tablewrap"><table><thead><tr><th>Vendor</th><th>Account</th><th class="r">Amount</th><th>Check #</th><th>Tracking #</th><th>Sent</th><th class="r"></th></tr></thead>
      <tbody>${transit.length?transit.map(b=>{const d=b.sent?daysUntil(b.sent.date):null;const overdue=!(b.sent&&b.sent.tracking)&&d!==null&&d<=-2;const noTrack=!(b.sent&&b.sent.tracking);return `<tr class="click" data-bill="${b.id}"><td><div class="vendorcell"><div class="vlogo">${abbr(b.vendor)}</div><div class="vmeta"><b>${b.vendor}</b><span>${invOf(b)}</span></div></div></td><td><span class="entity-chip"><span class="pin"></span>${b.account}</span></td><td class="r mono" style="font-weight:700">${money(b.amount)}</td><td class="mono" style="font-size:12px">${b.checkNumber||'—'}</td><td class="mono" style="font-size:12px">${(b.sent&&b.sent.tracking)?b.sent.tracking:(overdue?'<span class="badge b-red" style="font-size:9px;padding:1px 6px">missing &gt;1d</span>':'<span class="badge b-amber" style="font-size:9px;padding:1px 6px">needed</span>')}</td><td class="mono" style="font-size:12px;color:var(--ink-2)">${b.sent?fmtD(b.sent.date)+' · '+b.sent.initials:'—'}</td><td class="r" style="white-space:nowrap">${(can('record')||can('create'))?`<button class="btn btn-ghost btn-sm" data-track="${b.id}">${svg(ICN.truck,13)} ${noTrack?'Tracking #':'Edit #'}</button> <button class="btn btn-gold btn-sm" data-delivered="${b.id}">${svg(ICN.check,13)} Delivered</button>`:''}</td></tr>`;}).join(''):`<tr><td colspan="7"><div class="empty">${svg(ICN.truck,30)}<div>Nothing in transit.</div></div></td></tr>`}</tbody></table></div>
    </div>
    ${delivered.length?`<div class="card"><div class="card-h"><h3>Payment delivered</h3><span class="sub">${delivered.length}</span></div><div class="tablewrap"><table><thead><tr><th>Vendor</th><th>Account</th><th class="r">Amount</th><th>Check #</th><th>Tracking #</th><th>Delivered</th></tr></thead><tbody>${delivered.map(b=>`<tr class="click" data-bill="${b.id}"><td>${b.vendor}</td><td><span class="entity-chip"><span class="pin"></span>${b.account}</span></td><td class="r mono" style="font-weight:700">${money(b.amount)}</td><td class="mono" style="font-size:12px">${b.checkNumber||'—'}</td><td class="mono" style="font-size:12px">${(b.sent&&b.sent.tracking)||'—'}</td><td class="mono" style="font-size:12px;color:var(--ink-2)">${b.delivered?fmtD(b.delivered.date)+' · '+b.delivered.initials:'—'}</td></tr>`).join('')}</tbody></table></div></div>`:''}`;
  },

  /* ---------- VENDORS ---------- */
  // ===== EOM Tracker =====
  eomMonths(){return ['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06'];},
  eomData(mk){
    // bills in this month (by received date), grouped by vendor
    const inMonth=BILLS.filter(b=>!b.isChase&&monthKey(b.receivedDate)===mk);
    const byVendor={};inMonth.forEach(b=>{const k=(b.vendor||'').toLowerCase();(byVendor[k]=byVendor[k]||[]).push(b);});
    return EOM_DEFS.map(([vendor,freq,exp])=>{
      const got=byVendor[vendor.toLowerCase()]||[];
      const total=got.reduce((s,b)=>s+(+b.amount||0),0);
      const accts=new Set(got.map(b=>String(b.account||'')).filter(Boolean));
      const present=Math.max(got.length, accts.size);
      const expected=exp||1;
      const missing=Math.max(0, expected-present);
      const lastPaid=got.reduce((d,b)=>{const p=b.paid&&b.paid.date;return p&&p>d?p:d;},'');
      return {vendor,freq,expected,present,missing,total,lastPaid,complete:expected?Math.min(1,present/expected):1};
    });
  },
  v_eom(){
    const mk=this.state.eomMonth||this.eomMonths().slice(-1)[0];
    const onlyMissing=!!this.state.eomMissing;
    let rows=this.eomData(mk);
    const totVendors=rows.length;
    const fullyDone=rows.filter(r=>r.missing===0).length;
    const totalMissing=rows.reduce((s,r)=>s+r.missing,0);
    const monthTotal=rows.reduce((s,r)=>s+r.total,0);
    const pct=totVendors?Math.round(100*fullyDone/totVendors):0;
    if(onlyMissing)rows=rows.filter(r=>r.missing>0);
    rows.sort((a,b)=>b.missing-a.missing||b.total-a.total);
    const monthOpts=this.eomMonths().map(m=>`<option value="${m}"${m===mk?' selected':''}>${this.monthLabel(m)}</option>`).join('');
    return `
    <div class="filters" style="flex-wrap:wrap;gap:10px;align-items:center">
      <select class="selent" onchange="App.eomSet('month',this.value)" style="min-width:150px">${monthOpts}</select>
      <label style="display:flex;gap:6px;align-items:center;font-size:13px;color:var(--ink-2);cursor:pointer"><input type="checkbox" ${onlyMissing?'checked':''} onchange="App.eomSet('missing',this.checked)"> Missing only</label>
      <span style="margin-left:auto;font-size:13px;color:var(--ink-3)">Recurring vendors expected to be paid each cycle</span>
    </div>
    <div class="eom-cards">

      <tbody>${list.length?list.map(v=>{const ap=v.approver?(USERS.find(u=>u.u===v.approver)||{}).name||v.approver:'—';const M=meta.get(v),bal=M.bal,lp=M.lp;return `<tr style="${v.active?'':'opacity:.55'}"><td><div class="vendorcell"><div class="vlogo">${abbr(v.n)}</div><div class="vmeta"><b>${v.n}</b><span>${v.m==='To be Picked Up'?'check · pickup':(v.m||'no default')}</span></div></div></td><td style="font-size:12.5px">${v.m||'—'}</td><td class="r mono" style="font-weight:600;${bal>0?'':'color:var(--ink-3)'}">${bal>0?money(bal):'—'}</td><td style="font-size:12px;color:var(--ink-2);white-space:nowrap">${lp?fmtD(lp.date)+' <span class="mono" style="color:var(--ink-3)">'+money(lp.amount)+'</span>':'<span style="color:var(--ink-3)">—</span>'}</td><td class="r mono" style="font-size:12px;color:var(--ink-2)">${v.prevYr?money(v.prevYr):'—'}</td><td style="font-size:12px;color:var(--ink-2)">${v.accounts&&Object.keys(v.accounts).length?`<button class="btn btn-ghost btn-sm" style="padding:3px 9px;font-size:12px" onclick="event.stopPropagation();App.viewAccounts('${v.n.replace(/'/g,"\\'")}')">${svg(ICN.entity,12)} ${Object.keys(v.accounts).length} stores</button>`:'—'}</td><td style="font-size:12px;color:var(--ink-2);max-width:240px">${v.a?v.a:'<span style="color:var(--ink-3)">—</span>'}</td><td style="font-size:12.5px;color:var(--ink-2)">${ap}</td><td>${v.active?'<span class="badge b-green"><span class="dot"></span>Active</span>':'<span class="badge b-gray"><span class="dot"></span>Inactive</span>'}</td>${can('vendors_toggle')?`<td class="r"><button class="btn btn-ghost btn-sm" data-vedit="${v.n}">${svg(ICN.edit,13)}</button> <button class="btn btn-ghost btn-sm" data-vtoggle="${v.n}">${v.active?'Deactivate':'Activate'}</button>${canDelete()?` <button class="btn btn-ghost btn-sm" style="color:var(--red)" data-delvendor="${v.n.replace(/'/g,"\\'")}">${svg(ICN.trash,13)}</button>`:''}</td>`:''}</tr>`}).join(''):`<tr><td colspan="10"><div class="empty">${svg(ICN.vendor,28)}<div>   async clearBillsServer(){
    if(CURRENT.role!=='admin')return;
    if(!confirm('Delete ALL bills from the server? This wipes every bill (imported and entered) from storage. Vendors and users are kept. You can re-import afterward. Continue?'))return;
    try{
      const r=await API.clearBills();
      // wipe local memory too so nothing stale gets saved back
      BILLS=[];
      this.toast('Server bills cleared'+(r&&r.removedShards!=null?' ('+r.removedShards+' shards)':''));
      // reload fresh state from server
      const d=await API.load();applyOps(d.ops);this.render();
    }catch(e){this.toast('Clear failed — '+(e.message||''));}
  },
  importHistory(file,mode){
    if(!file||CURRENT.role!=='admin')return;
    const rd=new FileReader();
    rd.onload=()=>{
      let data;try{data=JSON.parse(rd.result);}catch(e){this.toast('That file isn\'t valid JSON');return;}
      const incoming=Array.isArray(data)?data:(data.bills||[]);
      if(!incoming.length){this.toast('No bills found in that file');return;}
      if(mode==='replace'){
        const before=BILLS.length;
        // drop every imported bill (and any dup) — keep only bills created live in the portal
        BILLS=BILLS.filter(b=>!b.imported);
        const removed=before-BILLS.length;
        incoming.forEach(b=>{if(b&&b.id!=null)BILLS.push(b);});
        if(data.nextId&&data.nextId>nextId)nextId=data.nextId;
        this.log('Replaced bill history','removed '+removed+' · loaded '+incoming.length);
        this.persist();this.toast('Replaced: removed '+removed+', loaded '+incoming.length+' bills');this.render();
        return;
      }
      const byId=new Map(BILLS.map(b=>[b.id,b]));
      let added=0,updated=0;
      incoming.forEach(b=>{
        if(!b||b.id==null)return;
        const ex=byId.get(b.id);
        if(!ex){BILLS.push(b);byId.set(b.id,b);added++;}
        else if(ex.imported){          // refresh previously-imported rows in place
          Object.assign(ex,b);updated++;
        }
      });
      if(data.nextId&&data.nextId>nextId)nextId=data.nextId;
      this.log('Imported history',added+' added, '+updated+' updated');
      this.persist();this.toast('Imported '+added+' · updated '+updated+' bills');this.render();
    };
    rd.readAsText(file);
  },

  saveCreate(){const g=id=>document.getElementById(id);
    const vname=(g('f_vendor').value||'').trim(),account=g('f_acct').value,inv=(g('f_inv').value||'').trim();
    const amount=parseFloat(g('f_amt').value),due=mdyToISO(g('f_due')?g('f_due').value:'')||'',gl=(g('f_gl').value||'').trim(),prepaid=g('f_prepaid').checked,link=(g('f_link')?g('f_link').value:'').trim();
    const invoiceDate=mdyToISO(g('f_invdate')?g('f_invdate').value:'')||'';
    const approq=g('f_approq')?g('f_approq').value==='yes':false;const approver=approq&&g('f_approver')?g('f_approver').value:'';
    const miss=[];if(!vname)miss.push('vendor');if(!account)miss.push('account');if(!inv)miss.push('invoice #');if(!(amount>0))miss.push('amount');
    if(miss.length){this.toast('Add '+miss.join(', '));return;}
    if(approq&&!approver){this.toast('Pick an approver (or set Approval required to No)');return;}
    const v=vendor(vname);
    if(!v){this.toast('“'+vname+'” isn’t an active vendor — pick from the list (admin adds new ones)');return;}
    if(!v.active){this.toast('“'+vname+'” is inactive — reactivate it first');return;}
    const b={id:nextId++,vendor:v.n,account,inv,amount,due,invoiceDate,gl,prepaid,link,receivedDate:todayISO,
      method:null,tracking:'',payType:null,enteredBy:CURRENT.u,enteredInitials:CURRENT.initials,
      reqApproval:{required:approq,approver},
      stage:'submission',approval:null,paid:null,pickedUp:null,sync:'synced'};
    if(CURRENT.inTraining){
      BILLS.unshift(b);
      this.logBill(b,'Entered (pending submission)',v.n+' · '+account+' · '+inv);
      this.persist();this.syncBill(b);this.closeDrawer();this.toast('Bill #'+b.id+' sent to Pending Submission');this.render();
    }else{
      this.routeAfterEntry(b);
      BILLS.unshift(b);
      this.logBill(b,'Entered bill',v.n+' · '+account+' · '+inv+' · '+(b.stage==='pending'?'routed for approval':'ready for payment'));
      this.persist();this.syncBill(b);this.closeDrawer();this.toast('Bill #'+b.id+(b.stage==='pending'?' routed for approval':' is ready for payment'));this.render();
    }
  },
  /* route a non-trainee entry: explicit per-bill approval wins, else vendor approver, else ready */
  routeAfterEntry(b){
    if(b.reqApproval&&b.reqApproval.required){b.stage='pending';b.approval={status:'pending',approver:b.reqApproval.approver||''};return;}
    if(b.reqApproval&&b.reqApproval.required===false){b.stage='ready';return;}
    const v=vendor(b.vendor);if(v&&v.approver){b.stage='pending';b.approval={status:'pending',approver:v.approver};}else{b.stage='ready';}
  },
  createApprToggle(){const y=$('#f_approq')&&$('#f_approq').value==='yes';const w=$('#f_appr_wrap');if(w)w.style.display=y?'':'none';},

  /* ---------- record payment (AP) ---------- */
  defaultMethod(b){if(FAISAL.includes(b.account))return 'Check';return vmethod(b.vendor)||'ACH';},
  isCheckLike(m){return /check/i.test(m||'')||m==='To be Picked Up';},
  refLabel(m){return this.isCheckLike(m)?'Check / tracking #':'Confirmation #';},
  refPlaceholder(m){return this.isCheckLike(m)?'Check number':'Confirmation / reference #';},
  openRecord(id){const b=BILLS.find(x=>x.id===id);if(!b||!can('record'))return;
    const inp='border:none;background:none;width:100%;font:inherit;font-weight:600;padding:9px 11px';
